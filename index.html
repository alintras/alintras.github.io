<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aktas Homepage</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="css/search.css">
    <link rel="stylesheet" href="css/nav.css">
    <link rel="icon" href="images/favicon.ico" type="image/x-icon">
    <link rel="icon" href="images/favicon-32x32.png" type="image/png" sizes="32x32">
    <link rel="icon" href="images/favicon-16x16.png" type="image/png" sizes="16x16">
    <link rel="apple-touch-icon" href="images/apple-touch-icon.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5829220477325146" crossorigin="anonymous"></script>
    <script src="js/nav.js" defer></script>
    <script src="js/search.js" defer></script>
    <script src="js/script.js" defer></script>

    <style>
        a { color: inherit; text-decoration: none; }
    </style>
</head>
<body>

    <table id="layout" cellpadding="0" cellspacing="0">
        <tr>
            <td id="layout-sidebar">
                <div id="sidebar"></div>
            </td>
            <td id="layout-content">
                <header>
                    <h2>My Homepage</h2>
                    <div id="search-bar">
                        <input type="text" id="search-input" placeholder="Search..." autocomplete="off"
                            autofocus                            
                            oninput="filterSite()" onkeydown="if(event.key==='Enter')doSearch()">
                        <select id="engine-select" title="Search engine" onchange="saveEngine()">
                            <option value="google">Google</option>
                            <option value="ddg">DuckDuckGo</option>
                            <option value="brave">Brave</option>
                        </select>
                        <button onclick="doSearch()">Search</button>
                    </div>
                    <div id="site-results"></div>
                </header>
                <div id="main-content">
                    <main>
                        <section id="profile-section">
                            <div class="text">
                                <div class="title-row" style="display:flex; align-items:center; gap:10px;">
                                    <h3 style="margin:0;">Hey there!</h3>
                                    <div id="clock" style="font-size:0.9em; opacity:0.7; margin-right:auto;"></div>
                                </div>
                                <p>
                                Welcome to my page. <br> Take a look around!<br><br>
                                My name is <b>Ali Aktas</b> (alintras).<br><br>
                                Currently, I'm a Computer Science major and Statistics minor at LMU Munich.
                                </p>
                            </div>
                        </section>
                    </main>
                </div>
            </td>
        </tr>
    </table>

    <footer>
        <pre id="ascii" style="font-family:'Courier New',monospace; white-space:pre; margin:0; padding:0;"></pre>
        <script>
            const frames = [
` 
 ,…,    ,_     ,…,    ,_     ,…,    ,_     ,…,   
[•.•]  [•.•]  [•.•]  [•.•]  [•.•]  [•.•]  [•.•]  
 """    """    """    """    """    """    """   
`,
` 
 ,_     ,…,    ,_     ,…,    ,_     ,…,    ,_    
[•.•]  [•.•]  [•.•]  [•.•]  [•.•]  [•.•]  [•.•]  
 """    """    """    """    """    """    """   
`
            ];
            let i = 0;
            setInterval(() => {
                document.getElementById("ascii").textContent = frames[i];
                i = (i + 1) % frames.length;
            }, 300);
        </script>
        <p>&copy; 2024 Ali Aktas | <a href="mailto:alintras@proton.me">alintras@proton.me</a></p>
    </footer>
    <script>
        setInterval(()=>{
        const now=new Date();
        document.getElementById("clock").textContent=now.toLocaleTimeString();
        },1000);
    </script>

    <script>
        if ("serviceWorker" in navigator) {
        navigator.serviceWorker.register("/service-worker.js");
        }
    </script>
</body>
</html>
