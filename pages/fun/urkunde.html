<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Certificate Generator</title>
<script src="lang.js"></script>
<style>
  a { color: inherit; text-decoration: none;}
  body{font-family:monospace;max-width:1000px;margin:40px auto;padding:0 20px;background:#fff;color:#000}
  h1{font-size:13px;font-weight:normal;border-bottom:1px solid #000;padding-bottom:6px;margin-bottom:24px;letter-spacing:2px;text-transform:uppercase}
  .wrap{display:grid;grid-template-columns:260px 1fr;gap:48px}
  label{display:block;font-size:10px;margin-top:12px;margin-bottom:2px;text-transform:uppercase;letter-spacing:1px}
  input[type=text],input[type=date],textarea{width:100%;border:none;border-bottom:1px solid #000;padding:3px 0;font-family:monospace;font-size:13px;background:none;outline:none;box-sizing:border-box;resize:none}
  button{margin-top:8px;padding:5px 14px;font-family:monospace;font-size:11px;background:#000;color:#fff;border:none;cursor:pointer;letter-spacing:1px;text-transform:uppercase}
  .style-row{display:flex;gap:4px;margin-bottom:10px;flex-wrap:wrap}
  .sb{border:1px solid #000;padding:2px 8px;cursor:pointer;font-family:monospace;font-size:11px;background:#fff}
  .sb.on{background:#000;color:#fff}
  a.dl{display:inline-block;margin-top:10px;font-size:11px;color:#000;cursor:pointer}
  .urk{padding:40px 48px;text-align:center;position:relative;font-family:Georgia,serif;box-shadow:0 4px 20px rgba(0,0,0,0.12)}
  .urk-inner{position:absolute;inset:10px;pointer-events:none}
  .urk-corner{position:absolute;font-size:18px;pointer-events:none}
  .urk-corner.tl{top:16px;left:20px}.urk-corner.tr{top:16px;right:20px}.urk-corner.bl{bottom:16px;left:20px}.urk-corner.br{bottom:16px;right:20px}
  .urk-org{font-family:monospace;font-size:10px;letter-spacing:3px;text-transform:uppercase;margin-bottom:8px}
  .urk-title{font-size:34px;letter-spacing:8px;margin-bottom:4px}
  .urk-hr{border:none;margin:14px auto;width:60%}
  .urk-pre{font-size:14px;font-style:italic;margin-bottom:4px}
  .urk-name{font-size:40px;font-style:italic;margin:8px 0;font-family:'Palatino Linotype',Palatino,serif}
  .urk-reason{font-size:16px;font-weight:bold;margin:8px 0;letter-spacing:2px;text-transform:uppercase}
  .urk-body{font-size:13px;font-style:italic;margin:4px 0 12px}
  .urk-date{font-family:monospace;font-size:11px;margin-top:16px}
  .urk-sigs{display:flex;justify-content:space-between;align-items:flex-end;margin-top:40px}
  .urk-sig{min-width:140px;padding-top:4px;font-size:10px;font-family:monospace;text-align:center}
  .urk-stamp{width:64px;height:64px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:7px;font-family:monospace;text-align:center;line-height:1.4;border:1px solid}
  .urk-gold{background:linear-gradient(160deg,#fffef0,#fff8e0,#fffef0);border:2px solid #c8a050}
  .urk-gold .urk-inner{border:1px solid #e8d080}.urk-gold .urk-corner,.urk-gold .urk-stamp{color:#c8a050;border-color:#c8a050}
  .urk-gold .urk-hr{border-top:1px solid #c8a050}.urk-gold .urk-title,.urk-gold .urk-name{color:#8a6010}
  .urk-gold .urk-org,.urk-gold .urk-date{color:#a08040}.urk-gold .urk-sig{border-top:1px solid #c8a050;color:#888}
  .urk-blue{background:linear-gradient(160deg,#f0f4ff,#e8eeff,#f0f4ff);border:2px solid #2a5aaa}
  .urk-blue .urk-inner{border:1px solid #a0bae0}.urk-blue .urk-corner,.urk-blue .urk-stamp{color:#2a5aaa;border-color:#2a5aaa}
  .urk-blue .urk-hr{border-top:1px solid #2a5aaa}.urk-blue .urk-title,.urk-blue .urk-name{color:#1a3a7a}
  .urk-blue .urk-org,.urk-blue .urk-date{color:#4a7acc}.urk-blue .urk-sig{border-top:1px solid #2a5aaa;color:#888}
  .urk-red{background:linear-gradient(160deg,#fff0f0,#ffe8e8,#fff0f0);border:2px solid #8a1a1a}
  .urk-red .urk-inner{border:1px solid #d08080}.urk-red .urk-corner,.urk-red .urk-stamp{color:#8a1a1a;border-color:#8a1a1a}
  .urk-red .urk-hr{border-top:1px solid #8a1a1a}.urk-red .urk-title,.urk-red .urk-name{color:#6a0a0a}
  .urk-red .urk-org,.urk-red .urk-date{color:#aa3030}.urk-red .urk-sig{border-top:1px solid #8a1a1a;color:#888}
  .urk-dark{background:linear-gradient(160deg,#1a1a2a,#1e2038,#1a1a2a);border:2px solid #4a6aaa;color:#e0e8ff}
  .urk-dark .urk-inner{border:1px solid #2a4080}.urk-dark .urk-corner,.urk-dark .urk-stamp{color:#6a8acc;border-color:#4a6aaa}
  .urk-dark .urk-hr{border-top:1px solid #4a6aaa}.urk-dark .urk-title{color:#a0c0ff}.urk-dark .urk-name{color:#c0d8ff}
  .urk-dark .urk-org,.urk-dark .urk-date{color:#6a8acc}.urk-dark .urk-pre,.urk-dark .urk-reason,.urk-dark .urk-body{color:#c0d0f0}
  .urk-dark .urk-sig{border-top:1px solid #4a6aaa;color:#6a8acc}
</style>
</head>
<body>
<div style="position:fixed; top:10px; left:10px;">
  <a href="/../index.html">🏠 Home</a>
</div> 
<h1 data-t="u_title">Certificate Generator</h1>
<div class="wrap">
  <div>
    <label data-t="style">Style</label>
    <div class="style-row">
      <button class="sb on" onclick="ss(this,'urk-gold')" data-t="u_gold">Gold</button>
      <button class="sb" onclick="ss(this,'urk-blue')" data-t="u_blue">Blue</button>
      <button class="sb" onclick="ss(this,'urk-red')" data-t="u_red">Red</button>
      <button class="sb" onclick="ss(this,'urk-dark')" data-t="u_dark">Dark</button>
    </div>
    <label data-t="u_org">Organization</label><input type="text" id="org" value="Sports & Recreation Association" oninput="u()">
    <label data-t="u_cert_title">Title</label><input type="text" id="title" value="CERTIFICATE" oninput="u()">
    <label data-t="u_recipient">Recipient</label><input type="text" id="recipient" value="Max Mustermann" oninput="u()">
    <label data-t="u_reason">Achievement</label><input type="text" id="reason" value="1st Place — City Run 2024" oninput="u()">
    <label data-t="u_body">Supporting text</label><textarea id="body" rows="2" oninput="u()">in recognition of outstanding performance and dedication</textarea>
    <label data-t="u_place">Place</label><input type="text" id="place" value="New York" oninput="u()">
    <label data-t="u_date">Date</label><input type="date" id="date" value="2024-06-15" oninput="u()">
    <label data-t="u_sig1">Signatory 1</label><input type="text" id="sig1" value="Dr. Hans Miller" oninput="u()">
    <label data-t="u_sig2">Signatory 2</label><input type="text" id="sig2" value="Anna Johnson" oninput="u()">
    <label data-t="u_stamp">Stamp text</label><input type="text" id="stamp" value="SRA NEW YORK" oninput="u()">
    <button onclick="u()" data-t="create">Create</button>
  </div>
  <div>
    <div class="urk urk-gold" id="urk">
      <div class="urk-inner"></div>
      <div class="urk-corner tl">✦</div><div class="urk-corner tr">✦</div>
      <div class="urk-corner bl">✦</div><div class="urk-corner br">✦</div>
      <div class="urk-org" id="u-org">Sports & Recreation Association</div>
      <div class="urk-title" id="u-title">CERTIFICATE</div>
      <hr class="urk-hr">
      <div class="urk-pre" data-t="u_awarded_to">This certificate is awarded to</div>
      <div class="urk-name" id="u-name">Max Mustermann</div>
      <div class="urk-reason" id="u-reason">1st Place — City Run 2024</div>
      <div class="urk-body" id="u-body">in recognition of outstanding performance and dedication</div>
      <hr class="urk-hr">
      <div class="urk-date" id="u-date">New York, June 15, 2024</div>
      <div class="urk-sigs">
        <div class="urk-sig" id="u-sig1">Dr. Hans Miller</div>
        <div class="urk-stamp" id="u-stamp">SRA<br>NY</div>
        <div class="urk-sig" id="u-sig2">Anna Johnson</div>
      </div>
    </div>
    <a class="dl" onclick="alert(t('save_hint'))" data-t="save">↓ Save</a>
  </div>
</div>
<script>
const months={en:['January','February','March','April','May','June','July','August','September','October','November','December'],de:['Januar','Februar','März','April','Mai','Juni','Juli','August','September','Oktober','November','Dezember'],fr:['janvier','février','mars','avril','mai','juin','juillet','août','septembre','octobre','novembre','décembre'],es:['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'],pt:['janeiro','fevereiro','março','abril','maio','junho','julho','agosto','setembro','outubro','novembro','dezembro'],ru:['января','февраля','марта','апреля','мая','июня','июля','августа','сентября','октября','ноября','декабря'],zh:['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'],ar:['يناير','فبراير','مارس','أبريل','مايو','يونيو','يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'],ja:['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'],hi:['जनवरी','फरवरी','मार्च','अप्रैल','मई','जून','जुलाई','अगस्त','सितंबर','अक्टूबर','नवंबर','दिसंबर']};
function fd(v){if(!v)return'';const d=new Date(v);const lang=window._lang||'en';const ml=months[lang]||months.en;return`${document.getElementById('place').value}, ${d.getDate()} ${ml[d.getMonth()]} ${d.getFullYear()}`;}
function ss(el,cls){document.querySelectorAll('.sb').forEach(b=>b.classList.remove('on'));el.classList.add('on');document.getElementById('urk').className='urk '+cls;}
function u(){
  document.getElementById('u-org').textContent=document.getElementById('org').value;
  document.getElementById('u-title').textContent=document.getElementById('title').value;
  document.getElementById('u-name').textContent=document.getElementById('recipient').value;
  document.getElementById('u-reason').textContent=document.getElementById('reason').value;
  document.getElementById('u-body').textContent=document.getElementById('body').value;
  document.getElementById('u-date').textContent=fd(document.getElementById('date').value);
  document.getElementById('u-sig1').textContent=document.getElementById('sig1').value;
  document.getElementById('u-sig2').textContent=document.getElementById('sig2').value;
  document.getElementById('u-stamp').innerHTML=document.getElementById('stamp').value.split(' ').join('<br>');
  document.querySelector('.urk-pre').textContent=t('u_awarded_to');
}
document.addEventListener('langready',u);
</script>
</body>
</html>
