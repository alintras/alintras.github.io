<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfect Circle Challenge</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        a { color: inherit; text-decoration: none; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            color: #111;
        }
        .container { max-width: 700px; width: 100%; }
        header { text-align: center; margin-bottom: 20px; }
        h1 { font-size: 2em; margin-bottom: 8px; }
        .subtitle { font-size: 1em; color: #555; }
        .score-display {
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 10px;
        }
        .stat {
            text-align: center;
            padding: 12px 20px;
            border: 1px solid #ddd;
            flex: 1;
            min-width: 120px;
        }
        .stat-label { font-size: 0.85em; color: #555; margin-bottom: 4px; }
        .stat-value { font-size: 1.8em; font-weight: bold; }
        .instructions { text-align: center; color: #555; margin-bottom: 15px; font-size: 0.95em; }
        .canvas-container {
            display: flex;
            justify-content: center;
            margin-bottom: 15px;
        }
        canvas {
            border: 1px solid #111;
            cursor: crosshair;
            background: #fafafa;
            touch-action: none;
            max-width: 100%;
        }
        .controls {
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 15px;
        }
        button {
            padding: 10px 24px;
            font-size: 1em;
            border: 1px solid #111;
            background: #fff;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }
        button:hover { background: #f0f0f0; }
        .result-message {
            text-align: center;
            margin-top: 15px;
            font-size: 1.1em;
            font-weight: bold;
            min-height: 28px;
        }
        .tips {
            border-top: 1px solid #ddd;
            padding-top: 20px;
            margin-top: 20px;
            color: #444;
            font-size: 0.95em;
        }
        .tips h3 { margin-bottom: 8px; }
        .tips ul { list-style-position: inside; }
        .tips li { margin: 5px 0; }
        @media (max-width: 600px) {
            h1 { font-size: 1.5em; }
        }
    </style>
</head>
<body>
    <div style="position:fixed; top:10px; left:10px;">
        <a href="/../index.html">🏠 Home</a>
    </div>
    <div class="container">
        <header>
            <h1>Perfect Circle Challenge</h1>
            <p class="subtitle">Can you draw a perfect circle freehand?</p>
        </header>
        <div class="score-display">
            <div class="stat">
                <div class="stat-label">Current Score</div>
                <div class="stat-value" id="currentScore">0%</div>
            </div>
            <div class="stat">
                <div class="stat-label">Best Score</div>
                <div class="stat-value" id="bestScore">0%</div>
            </div>
            <div class="stat">
                <div class="stat-label">Attempts</div>
                <div class="stat-value" id="attempts">0</div>
            </div>
        </div>
        <div class="instructions" id="instructions">Click and drag to draw a circle in one continuous motion!</div>
        <div class="canvas-container">
            <canvas id="drawingCanvas" width="500" height="500"></canvas>
        </div>
        <div class="controls">
            <button id="resetBtn">Try Again</button>
            <button id="clearStatsBtn">Reset Stats</button>
        </div>
        <div class="result-message" id="resultMessage"></div>
    </div>
    <script>
        const canvas = document.getElementById('drawingCanvas');
        const ctx = canvas.getContext('2d');
        const currentScoreEl = document.getElementById('currentScore');
        const bestScoreEl = document.getElementById('bestScore');
        const attemptsEl = document.getElementById('attempts');
        const resultMessageEl = document.getElementById('resultMessage');
        const instructionsEl = document.getElementById('instructions');
        const resetBtn = document.getElementById('resetBtn');
        const clearStatsBtn = document.getElementById('clearStatsBtn');

        let isDrawing = false;
        let points = [];
        let attempts = parseInt(localStorage.getItem('circleAttempts') || '0');
        let bestScore = parseFloat(localStorage.getItem('circleBestScore') || '0');
        attemptsEl.textContent = attempts;
        bestScoreEl.textContent = bestScore.toFixed(1) + '%';

        function getMousePos(e) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            let clientX, clientY;
            if (e.touches && e.touches.length > 0) {
                clientX = e.touches[0].clientX;
                clientY = e.touches[0].clientY;
            } else {
                clientX = e.clientX;
                clientY = e.clientY;
            }
            return { x: (clientX - rect.left) * scaleX, y: (clientY - rect.top) * scaleY };
        }

        function startDrawing(e) {
            e.preventDefault();
            isDrawing = true;
            points = [];
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            resultMessageEl.textContent = '';
            instructionsEl.textContent = 'Keep going... release when done!';
            const pos = getMousePos(e);
            points.push(pos);
            ctx.strokeStyle = '#111';
            ctx.lineWidth = 2;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.beginPath();
            ctx.moveTo(pos.x, pos.y);
        }

        function draw(e) {
            if (!isDrawing) return;
            e.preventDefault();
            const pos = getMousePos(e);
            points.push(pos);
            ctx.lineTo(pos.x, pos.y);
            ctx.stroke();
        }

        function stopDrawing(e) {
            if (!isDrawing) return;
            e.preventDefault();
            isDrawing = false;
            instructionsEl.textContent = 'Click and drag to draw a circle in one continuous motion!';
            if (points.length < 10) {
                resultMessageEl.textContent = 'Too short! Try drawing a full circle.';
                return;
            }
            calculateScore();
        }

        function calculateScore() {
            if (points.length < 10) return;
            let sumX = 0, sumY = 0;
            points.forEach(p => { sumX += p.x; sumY += p.y; });
            const centerX = sumX / points.length;
            const centerY = sumY / points.length;
            const distances = points.map(p => Math.sqrt((p.x-centerX)**2 + (p.y-centerY)**2));
            const avgRadius = distances.reduce((a, b) => a + b, 0) / distances.length;
            const variance = distances.map(d => (d - avgRadius)**2).reduce((a, b) => a + b, 0) / distances.length;
            const stdDev = Math.sqrt(variance);
            const score = Math.max(0, 100 - (stdDev / avgRadius) * 100);
            const firstPoint = points[0], lastPoint = points[points.length - 1];
            const gap = Math.sqrt((lastPoint.x-firstPoint.x)**2 + (lastPoint.y-firstPoint.y)**2);
            let finalScore = gap > avgRadius * 0.2 ? score * 0.8 : score;
            if (gap > avgRadius * 0.2) resultMessageEl.textContent = 'Try to close the circle better!';

            attempts++;
            currentScoreEl.textContent = finalScore.toFixed(1) + '%';
            if (finalScore > bestScore) {
                bestScore = finalScore;
                bestScoreEl.textContent = bestScore.toFixed(1) + '%';
                localStorage.setItem('circleBestScore', bestScore.toString());
                resultMessageEl.textContent = 'New Best Score! ' + getScoreMessage(finalScore);
            } else if (resultMessageEl.textContent === '') {
                resultMessageEl.textContent = getScoreMessage(finalScore);
            }
            attemptsEl.textContent = attempts;
            localStorage.setItem('circleAttempts', attempts.toString());

            ctx.strokeStyle = 'rgba(0,0,0,0.2)';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.arc(centerX, centerY, avgRadius, 0, Math.PI * 2);
            ctx.stroke();
        }

        function getScoreMessage(score) {
            if (score >= 95) return 'Incredible! Almost perfect!';
            if (score >= 90) return 'Excellent work!';
            if (score >= 80) return 'Great job!';
            if (score >= 70) return 'Good attempt!';
            if (score >= 60) return 'Keep practicing!';
            return 'Try again!';
        }

        function reset() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            points = [];
            currentScoreEl.textContent = '0%';
            resultMessageEl.textContent = '';
            instructionsEl.textContent = 'Click and drag to draw a circle in one continuous motion!';
        }

        function clearStats() {
            if (confirm('Reset all stats?')) {
                attempts = 0; bestScore = 0;
                attemptsEl.textContent = '0';
                bestScoreEl.textContent = '0%';
                currentScoreEl.textContent = '0%';
                localStorage.removeItem('circleAttempts');
                localStorage.removeItem('circleBestScore');
                reset();
            }
        }

        canvas.addEventListener('mousedown', startDrawing);
        canvas.addEventListener('mousemove', draw);
        canvas.addEventListener('mouseup', stopDrawing);
        canvas.addEventListener('mouseleave', stopDrawing);
        canvas.addEventListener('touchstart', startDrawing);
        canvas.addEventListener('touchmove', draw);
        canvas.addEventListener('touchend', stopDrawing);
        canvas.addEventListener('touchcancel', stopDrawing);
        resetBtn.addEventListener('click', reset);
        clearStatsBtn.addEventListener('click', clearStats);
    </script>
</body>
</html>
