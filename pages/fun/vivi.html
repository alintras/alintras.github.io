<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Valentine? ☁️</title>
    <link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&display=swap" rel="stylesheet">
    <script src="/js/style.js" defer></script>
    <script>
        (function() {
            const saved = localStorage.getItem('theme');
            if (saved === 'dark') { document.documentElement.setAttribute('data-theme', 'dark'); }
        })();
    </script>
    <style>
        :root {
            --bg: #fff5f8;
            --card-bg: #ffffff;
            --text: #4a4a4a;
            --pink: #ff85a1;
            --border: #4a4a4a;
        }
    
        [data-theme="dark"] {
            --bg: #1a1a1a;
            --card-bg: #2d2d2d;
            --text: #f0f0f0;
            --pink: #ffb3c6;
            --border: #f0f0f0;
        }
    
        * { box-sizing: border-box; font-family: 'Gaegu', cursive; }
        
        body {
            margin: 0; min-height: 100vh;
            background-color: var(--bg);
            color: var(--text);
            display: flex; align-items: center; justify-content: center;
            overflow: hidden; position: relative;
        }
    
        /* --- BACKGROUND DECOR --- */
        .bg-ascii {
            position: absolute; font-family: monospace; font-size: 14px;
            color: var(--pink); opacity: 0.4; pointer-events: none; z-index: 1;
            white-space: nowrap;
        }
    
        /* --- INJECTED ELEMENT FIXES --- */
        .home-button {
            position: fixed; top: 20px; left: 20px; z-index: 2000;
        }
        .home-button a {
            background: var(--card-bg); border: 2px solid var(--border);
            padding: 5px 12px; box-shadow: 4px 4px 0px var(--border);
            text-decoration: none; color: var(--text); font-weight: bold;
            display: flex; align-items: center; gap: 8px;
        }
        .main-footer {
            position: fixed; bottom: 20px; width: 100%;
            text-align: center; z-index: 1000; font-size: 1.1rem;
        }
    
        /* --- CARD & CONTENT --- */
        .card {
            background: var(--card-bg);
            border: 3px solid var(--border);
            padding: 30px;
            width: min(400px, 90vw);
            text-align: center;
            box-shadow: 8px 8px 0px var(--border);
            z-index: 10; position: relative;
            display: flex; flex-direction: column; align-items: center;
        }
    
        .ascii-header {
            white-space: pre; font-family: monospace; font-size: 10px;
            line-height: 1.2; color: var(--pink); margin-bottom: 15px;
            display: inline-block; text-align: left;
        }
    
        h1 { font-size: 2.2rem; color: var(--pink); margin: 10px 0 20px 0; line-height: 1; }
    
        .buttons { 
            display: flex; justify-content: center; align-items: center; 
            gap: 20px; margin-top: 10px; width: 100%; padding-right: 60px;
        }
    
        button {
            border: 3px solid var(--border);
            padding: 10px 25px; font-size: 1.5rem;
            font-family: inherit; cursor: pointer;
            transition: transform 0.1s; background: #eee;
        }
    
        #yesBtn { background: var(--pink); color: white; }
        #yesBtn:hover { transform: scale(1.1); }
    
        #noBtn {
            position: fixed; z-index: 1500;
            transition: left 0.2s ease-out, top 0.2s ease-out;
        }
    
        .result { display: none; width: 100%; }
        .result img { 
            width: 100%; border: 3px solid var(--border); 
            margin-top: 15px; box-shadow: 5px 5px 0 var(--pink);
        }
    
        .sparkle {
            position: absolute; pointer-events: none; z-index: 100;
            font-size: 20px; animation: burst 1s ease-out forwards;
        }
    
        @keyframes burst {
            0% { transform: translate(-50%, -50%) scale(0); opacity: 1; }
            100% { transform: translate(calc(-50% + var(--vx)), calc(-50% + var(--vy))) scale(1.5); opacity: 0; }
        }
    </style>
</head>
<body>

<div class="bg-ascii" style="top:15%; left:10%;">（｡>‿‿<｡ ）</div>
<div class="bg-ascii" style="top:25%; right:10%;">*･゜ﾟ･*:.</div>
<div class="bg-ascii" style="bottom:20%; left:15%;">♥（ﾉ´∀`）</div>
<div class="bg-ascii" style="bottom:15%; right:15%;">☾︎☆</div>

<div class="card" id="card">
    <div id="mainContent">
        <div class="ascii-header">
                 _  _
                ( \/ )
         .---.   \  /   .-"-.
        /   6_6   \/   / 4 4 \
        \_  (__\       \_ v _/
        //   \\        //   \\
       ((     ))      ((     ))
jgs=====""===""========""===""=======
          |||            |||
           |              |</div>
        <h1>Will you be my Valentine?</h1>
        <div class="buttons">
            <button id="yesBtn">Yes! 💖</button>
            <div style="width:100px;"></div> </div>
    </div>

    <div class="result" id="result">
        <h1>YAY! 💕</h1>
        <div class="ascii-header" style="text-align: center; display: block;">(˵◕ω◕˵)</div>
        <p style="font-size: 1.5rem; margin: 5px 0;">I knew you'd say yes! 😌</p>
        <img src="https://gifdb.com/images/file/boa-hancock-luffy-hug-one-piece-mky2wqjlocxpo7zz.gif" alt="celebrate">
    </div>
</div>

<button id="noBtn">Nahh... 🙃</button>

<script>
    const noBtn = document.getElementById("noBtn");
    const yesBtn = document.getElementById("yesBtn");
    const result = document.getElementById("result");
    const mainContent = document.getElementById("mainContent");
    const card = document.getElementById("card");
    
    // Initialize No button position relative to the Yes button's layout
    function updateNoButtonPos() {
        const yesRect = yesBtn.getBoundingClientRect();
        noBtn.style.transition = "none";
        noBtn.style.left = (yesRect.right + 20) + "px";
        noBtn.style.top = yesRect.top + "px";
    }
    
    // Initial placement
    setTimeout(updateNoButtonPos, 100); 
    window.addEventListener('resize', updateNoButtonPos);
    
    function escape() {
        // Increased margin to keep it away from edges
        const margin = 100;
        const nx = Math.random() * (window.innerWidth - noBtn.offsetWidth - margin * 2) + margin;
        const ny = Math.random() * (window.innerHeight - noBtn.offsetHeight - margin * 2) + margin;
    
        // Faster transition makes it look like it's jumping away
        noBtn.style.transition = "all 0.1s ease-out";
        noBtn.style.left = nx + "px";
        noBtn.style.top = ny + "px";
    }
    
    // Detection logic
    document.addEventListener("mousemove", e => {
        const r = noBtn.getBoundingClientRect();
        const bx = r.left + r.width / 2;
        const by = r.top + r.height / 2;
        
        // Increased distance threshold (150) so it runs away before the cursor is even close
        const distance = Math.hypot(e.clientX - bx, e.clientY - by);
        if (distance < 150) {
            escape();
        }
    });
    
    // Fail-safe: if they manage to touch the button, it moves instantly
    noBtn.addEventListener("mouseover", escape);
    
    function celebrate() {
        for (let i = 0; i < 40; i++) {
            setTimeout(() => {
                const s = document.createElement('div');
                s.className = 'sparkle';
                const bits = ['💖','✨','⭐','(๑>ᴗ<๑)','♥','🎀'];
                s.innerHTML = bits[Math.floor(Math.random()*bits.length)];
                
                s.style.left = '50%';
                s.style.top = '50%';
                
                const vx = (Math.random() - 0.5) * 500;
                const vy = (Math.random() - 0.5) * 500;
                s.style.setProperty('--vx', `${vx}px`);
                s.style.setProperty('--vy', `${vy}px`);
                
                card.appendChild(s);
                setTimeout(() => s.remove(), 1000);
            }, i * 25);
        }
    }
    
    yesBtn.addEventListener("click", () => {
        mainContent.style.display = "none";
        noBtn.style.display = "none";
        result.style.display = "block";
        celebrate();
    });
    </script>
</body>
</html>
