<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💖💖💖</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png?v=2">
    <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="192x192" href="android-chrome-192x192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="android-chrome-512x512.png">
    <link rel="manifest" href="site.webmanifest">
    <script src="/js/style.js"></script>
    <style>
        a { color: inherit; text-decoration: none; }
        * { box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body {
            margin: 0; height: 100vh;
            background: linear-gradient(135deg, #ff9a9e, #fad0c4);
            display: flex; align-items: center; justify-content: center; overflow: hidden;
        }
        [data-theme="dark"] body {
            background: linear-gradient(135deg, #6b2d5e, #3d1a5e);
        }
        .card {
            background: rgba(255,255,255,0.88); backdrop-filter: blur(10px);
            border-radius: 24px; padding: 40px; width: min(360px, 90vw); text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.15); z-index: 10; position: relative;
        }
        .card h1 { font-size: clamp(1.2em, 5vw, 1.6em); color: #333; margin-bottom: 16px; }
        .buttons { display: flex; justify-content: center; align-items: center; gap: 15px; margin-top: 20px; }
        button { border: none; border-radius: 999px; padding: 14px 28px; font-size: 16px; font-weight: 600; cursor: pointer; touch-action: manipulation; }
        #yesBtn { background: linear-gradient(135deg,#ff5f6d,#ffc371); color: white; box-shadow: 0 8px 20px rgba(255,95,109,0.4); }
        #noBtn {
            background: #e0e0e0; color: #555; position: fixed; z-index: 1000;
            transition: left 0.3s cubic-bezier(0.2,0,0.2,1), top 0.3s cubic-bezier(0.2,0,0.2,1);
            user-select: none; -webkit-user-select: none;
        }
        .result { display: none; animation: fadeIn 0.8s ease; }
        .result img { width: 100%; border-radius: 16px; margin-top: 15px; max-height: 200px; object-fit: cover; }
        @keyframes fadeIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
        .confetti { position: fixed; width: 10px; height: 10px; top: -10px; animation: fall 3s linear forwards; z-index: 9999; border-radius: 2px; }
        @keyframes fall { to{transform:translateY(110vh) rotate(720deg);opacity:0} }
        #home-link { position: fixed; top: 10px; left: 10px; z-index: 2000; }
    </style>
</head>
<body>
<div id="home-link">
    <a href="/index.html"><img src="/assets/smileys/vhome.PNG" style="width:18px;height:18px;vertical-align:-2px;image-rendering:pixelated;"> Home</a>
</div>

<div class="card" id="card">
    <div id="mainContent">
        <h1>Baby, do you wanna be my Valentine? 💘</h1>
        <div class="buttons">
            <button id="yesBtn">Yes! 💖</button>
            <div style="width:110px;height:45px;"></div>
        </div>
    </div>
    <div class="result" id="result">
        <h1>Hurray! 💕</h1>
        <p>I knew it! 😌</p>
        <img src="https://gifdb.com/images/file/boa-hancock-luffy-hug-one-piece-mky2wqjlocxpo7zz.gif" alt="celebrate">
    </div>
</div>

<button id="noBtn">Nahh... 🙃</button>

<script>
const noBtn = document.getElementById("noBtn");
const yesBtn = document.getElementById("yesBtn");
const result = document.getElementById("result");
const mainContent = document.getElementById("mainContent");

// Position noBtn next to yesBtn on load
function updateNoButtonPos() {
    const yesRect = yesBtn.getBoundingClientRect();
    noBtn.style.transition = "none";
    noBtn.style.left = (yesRect.right + 15) + "px";
    noBtn.style.top = yesRect.top + "px";
}
window.addEventListener('load', updateNoButtonPos);
window.addEventListener('resize', updateNoButtonPos);

function escapeTo(avoidX, avoidY) {
    const margin = 60;
    const btnW = noBtn.offsetWidth;
    const btnH = noBtn.offsetHeight;
    let nx, ny, attempts = 0;
    do {
        nx = margin + Math.random() * (window.innerWidth - btnW - margin * 2);
        ny = margin + Math.random() * (window.innerHeight - btnH - margin * 2);
        attempts++;
    } while (Math.hypot(avoidX - nx - btnW/2, avoidY - ny - btnH/2) < 160 && attempts < 40);

    noBtn.style.transition = "left 0.25s ease-out, top 0.25s ease-out";
    noBtn.style.left = nx + "px";
    noBtn.style.top = ny + "px";
}

// Mouse — escape on hover proximity
document.addEventListener("mousemove", e => {
    const r = noBtn.getBoundingClientRect();
    const bx = r.left + r.width / 2;
    const by = r.top + r.height / 2;
    if (Math.hypot(e.clientX - bx, e.clientY - by) < 90) {
        escapeTo(e.clientX, e.clientY);
    }
});

// Touch — escape when tapped (before click fires)
noBtn.addEventListener("touchstart", e => {
    e.preventDefault();
    const touch = e.touches[0];
    escapeTo(touch.clientX, touch.clientY);
}, { passive: false });

function createConfetti() {
    for (let i = 0; i < 70; i++) {
        const c = document.createElement("div");
        c.className = "confetti";
        c.style.left = Math.random() * 100 + "vw";
        c.style.background = `hsl(${Math.random() * 360},100%,50%)`;
        c.style.animationDuration = (Math.random() * 2 + 2) + "s";
        c.style.animationDelay = (Math.random() * 0.5) + "s";
        document.body.appendChild(c);
        setTimeout(() => c.remove(), 4000);
    }
}

yesBtn.addEventListener("click", () => {
    mainContent.style.display = "none";
    noBtn.style.display = "none";
    result.style.display = "block";
    createConfetti();
});
</script>
</body>
</html>
