let currentLanguage = 'en';
let animationInterval = null;

function detectLanguage() {
    const l = (navigator.language || 'en').split('-')[0];
    return translations[l] ? l : 'en';
}

function changeLanguage(lang) {
    currentLanguage = lang;
    const t = translations[lang] || translations.en;
    document.getElementById('main-title').innerHTML = `💕 ${t.title} 💕`;
    document.getElementById('subtitle').textContent = t.subtitle;
    document.getElementById('label1').textContent = t.yourName;
    document.getElementById('label2').textContent = t.theirName;
    document.getElementById('name1').placeholder = t.yourNamePlaceholder;
    document.getElementById('name2').placeholder = t.theirNamePlaceholder;
    document.getElementById('calculateButton').innerHTML = t.calculate;
    document.getElementById('languageSelect').value = lang;
    // Update result message if visible
    const resultSection = document.getElementById('resultSection');
    if (resultSection.classList.contains('show')) {
        const pct = parseInt(document.getElementById('percentage').textContent);
        updateResultMessage(pct);
    }
}

function updateResultMessage(percentage) {
    const t = translations[currentLanguage] || translations.en;
    const msg = document.getElementById('message');
    if (percentage === 100) msg.textContent = t.messages.soulmates;
    else if (percentage === 0) msg.textContent = t.messages.nomatch;
    else if (percentage >= 80) msg.textContent = t.messages.perfect;
    else if (percentage >= 60) msg.textContent = t.messages.great;
    else if (percentage >= 40) msg.textContent = t.messages.good;
    else msg.textContent = t.messages.friends;
}

function calculateLove() {
    const name1 = document.getElementById('name1').value.trim().toLowerCase();
    const name2 = document.getElementById('name2').value.trim().toLowerCase();
    const t = translations[currentLanguage] || translations.en;
    if (!name1 || !name2) { alert(t.alertEmpty); return; }

    let percentage;
    if ((name1 === 'vivi' && name2 === 'ali') || (name1 === 'ali' && name2 === 'vivi')) {
        percentage = 100;
    } else if (name1 === 'vivi' || name2 === 'vivi') {
        percentage = 0;
    } else {
        const sorted = [name1, name2].sort().join('');
        let hash = 0;
        for (let i = 0; i < sorted.length; i++) {
            hash = ((hash << 5) - hash) + sorted.charCodeAt(i);
            hash = hash & hash;
        }
        percentage = 20 + (Math.abs(hash) % 80);
    }
    displayResult(name1, name2, percentage);
}

function displayResult(name1, name2, percentage) {
    const cap = s => s.charAt(0).toUpperCase() + s.slice(1);
    document.getElementById('namesDisplay').textContent = `${cap(name1)} ❤️ ${cap(name2)}`;
    document.getElementById('percentage').textContent = '0%';
    document.getElementById('compatibilityFill').style.width = '0%';

    if (animationInterval) clearInterval(animationInterval);
    let current = 0;
    animationInterval = setInterval(() => {
        if (current >= percentage) {
            clearInterval(animationInterval);
            animationInterval = null;
            createHearts(percentage);
        } else {
            current = Math.min(current + 2, percentage);
            document.getElementById('percentage').textContent = current + '%';
            document.getElementById('compatibilityFill').style.width = current + '%';
        }
    }, 30);

    const emoji = document.getElementById('emoji');
    if (percentage === 100) emoji.textContent = '💞';
    else if (percentage === 0) emoji.textContent = '💔';
    else if (percentage >= 80) emoji.textContent = '😍';
    else if (percentage >= 60) emoji.textContent = '💕';
    else if (percentage >= 40) emoji.textContent = '💖';
    else emoji.textContent = '💛';

    updateResultMessage(percentage);

    const section = document.getElementById('resultSection');
    section.classList.add('show');
    section.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function createHearts(percentage) {
    const container = document.getElementById('heartsContainer');
    container.innerHTML = '';
    const count = percentage > 70 ? 15 : percentage > 40 ? 8 : 5;
    for (let i = 0; i < count; i++) {
        setTimeout(() => {
            const h = document.createElement('div');
            h.className = 'floating-heart';
            h.textContent = ['❤️','💕','💖','💗','💝'][Math.floor(Math.random() * 5)];
            h.style.left = Math.random() * 100 + '%';
            h.style.animationDelay = '0s';
            h.style.animationDuration = (3 + Math.random()) + 's';
            container.appendChild(h);
            setTimeout(() => h.remove(), 4500);
        }, i * 200);
    }
}

function acceptCookies() { localStorage.setItem('cookieConsent','accepted'); document.getElementById('cookieBanner').classList.remove('show'); }
function declineCookies() { localStorage.setItem('cookieConsent','declined'); document.getElementById('cookieBanner').classList.remove('show'); }

document.addEventListener('DOMContentLoaded', () => {
    changeLanguage(detectLanguage());
    document.getElementById('languageSelect').addEventListener('change', e => changeLanguage(e.target.value));
    document.getElementById('calculateButton').addEventListener('click', calculateLove);
    ['name1','name2'].forEach(id => {
        document.getElementById(id).addEventListener('keypress', e => { if (e.key === 'Enter') calculateLove(); });
    });
    if (!localStorage.getItem('cookieConsent')) {
        document.getElementById('cookieBanner').classList.add('show');
    }
});
</script>
