<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Love Calculator ☁️</title>
    <link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&display=swap" rel="stylesheet">
    <style>
        a { color: var(--pink); text-decoration: none; }
        :root {
            --bg: #fff5f8;
            --card-bg: #ffffff;
            --text: #4a4a4a;
            --pink: #ff85a1;
            --border: #4a4a4a;
            --msg-bg: #fff0f3;
            --line: #eee;
        }

        [data-theme="dark"] {
            --bg: #1a1a1a;
            --card-bg: #2d2d2d;
            --text: #f0f0f0;
            --pink: #ffb3c6;
            --border: #f0f0f0;
            --msg-bg: #3d2b2f;
            --line: #444;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Gaegu', cursive;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 40px 20px;
            overflow-x: hidden;
        }

        .notebook {
            position: relative; /* CRITICAL: This keeps sparkles inside the box center */
            background: var(--card-bg);
            border: 3px solid var(--border);
            padding: 30px;
            max-width: 450px;
            width: 100%;
            box-shadow: 8px 8px 0px var(--border);
            margin: 20px 0;
        }

        .ascii-art {
            white-space: pre;
            font-family: monospace;
            font-size: 11px;
            line-height: 1.2;
            color: var(--pink);
            text-align: center;
            margin-bottom: 15px;
            display: block;
        }

        h1 { text-align: center; font-size: 2.2rem; margin-bottom: 5px; color: var(--pink); }
        .subtitle { text-align: center; margin-bottom: 25px; font-size: 1.2rem; }
        .input-box { margin-bottom: 20px; }
        
        input[type="text"] {
            width: 100%;
            padding: 12px;
            border: 2px dashed var(--border);
            background: transparent;
            color: var(--text);
            font-family: inherit;
            font-size: 1.3rem;
            outline: none;
            text-align: center;
        }

        button {
            width: 100%;
            padding: 15px;
            background: var(--pink);
            color: white;
            border: 3px solid var(--border);
            font-family: inherit;
            font-size: 1.5rem;
            cursor: pointer;
            transition: transform 0.1s;
        }

        button:hover { transform: scale(1.02); filter: brightness(1.1); }
        button:active { transform: scale(0.98); }

        #resultArea {
            margin-top: 30px;
            display: none;
            text-align: center;
            border-top: 2px solid var(--line);
            padding-top: 20px;
        }

        .big-percent { font-size: 4rem; color: var(--pink); font-weight: bold; }

        .message-box {
            background: var(--msg-bg);
            padding: 10px;
            border: 2px solid var(--pink);
            margin: 10px 0;
            font-size: 1.2rem;
        }

        /* Fixed Sparkle Animations */
        .sparkle {
            position: absolute;
            pointer-events: none;
            font-size: 24px;
            z-index: 100;
            animation: burst 1s ease-out forwards;
        }

        @keyframes burst {
            0% { transform: translate(-50%, -50%) scale(0); opacity: 1; }
            100% { transform: translate(calc(-50% + var(--vx)), calc(-50% + var(--vy))) scale(1.5); opacity: 0; }
        }

        .ultra-love {
            animation: mega-shake 0.1s infinite, rainbow-border 0.5s infinite;
            transform-origin: center;
        }

        @keyframes mega-shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            20% { transform: translate(-3px, 0px) rotate(1deg); }
            40% { transform: translate(1px, -1px) rotate(1deg); }
            60% { transform: translate(-3px, 1px) rotate(0deg); }
            80% { transform: translate(-1px, -1px) rotate(1deg); }
            100% { transform: translate(1px, -2px) rotate(-1deg); }
        }

        @keyframes rainbow-border {
            0% { border-color: #ff0000; box-shadow: 0 0 20px #ff0000; }
            20% { border-color: #ff8000; box-shadow: 0 0 20px #ff8000; }
            40% { border-color: #ffff00; box-shadow: 0 0 20px #ffff00; }
            60% { border-color: #00ff00; box-shadow: 0 0 20px #00ff00; }
            80% { border-color: #0000ff; box-shadow: 0 0 20px #0000ff; }
            100% { border-color: #8b00ff; box-shadow: 0 0 20px #8b00ff; }
        }
        .home-button { order: -1; } 
    </style>
    <script src="/js/style.js" defer></script>
    <script>
        (function() {
            const saved = localStorage.getItem('theme');
            if (saved === 'dark') {
                document.documentElement.setAttribute('data-theme', 'dark');
            }
        })();
    </script>
</head>
<body>

    <div class="notebook">
        <pre class="ascii-art">
 |\__/,|   (`\
_.|o o  |_   ) )
-(((---(((--------</pre>
    
        <h1>Love Calculator!</h1>
        <p class="subtitle">Is it true love? 💖</p>
    
        <div class="input-box">
            <input type="text" id="name1" placeholder="First Name..." onkeydown="handleKeyPress(event)" autocomplete="off">
        </div>
        
        <div style="text-align: center; font-size: 1.5rem; margin: -10px 0 10px 0; color: var(--pink);">❤</div>
        
        <div class="input-box">
            <input type="text" id="name2" placeholder="Second Name..." onkeydown="handleKeyPress(event)" autocomplete="off">
        </div>
    
        <button onclick="checkLove()">Calculate Love! ✨</button>
    
        <div id="resultArea">
            <div class="big-percent" id="pct">0%</div>
            <div class="message-box" id="msg">Calculating...</div>
            <pre class="ascii-art" style="color:var(--text); opacity: 0.6; margin-top:10px;">
_   _
/ \ / \
(   V   )
\     /
\   /
\ /
V</pre>
        </div>
    </div> 

<script>
let celebrationTimeout; 
let loveTimer;

function handleKeyPress(event) {
    if (event.key === "Enter") {
        checkLove();
    }
}

function checkLove() {
    const nb = document.querySelector('.notebook');
    const msgBox = document.getElementById('msg');
    const pctDisp = document.getElementById('pct');
    
    // Instant Reset
    nb.classList.remove('ultra-love'); 
    clearTimeout(celebrationTimeout);
    clearInterval(loveTimer);
    document.querySelectorAll('.sparkle').forEach(s => s.remove());
    msgBox.innerText = "Calculating...";

    const n1 = document.getElementById('name1').value.trim();
    const n2 = document.getElementById('name2').value.trim();
    
    if (!n1 || !n2) {
        alert("Oops! Enter two names first! ✨");
        return;
    }

    // Logic
    const combined = (n1 + n2).toLowerCase();
    let score = 0;
    
    // Easter Egg
    const v1 = n1.toLowerCase();
    const v2 = n2.toLowerCase();
    const easterEggNames = ['vivi', 'ali', 'ugur', 'vivian', 'vivian helget', 'ali aktas', 'ali ugur', 'ali ugur aktas'];
    
    if (easterEggNames.includes(v1) && easterEggNames.includes(v2)) {
        score = 100;
    } else {
        let sum = 0;
        for(let i=0; i<combined.length; i++) sum += combined.charCodeAt(i);
        score = (sum % 101);
    }

    document.getElementById('resultArea').style.display = 'block';
    
    let current = 0;
    loveTimer = setInterval(() => {
        if (current >= score) {
            clearInterval(loveTimer);
            
            // UPDATE MESSAGE ONLY AFTER FINISHING
            if (score === 100) msgBox.innerText = "🌟 DESTINY! You are Soulmates!";
            else if (score > 80) msgBox.innerText = "🎀 True Love is in the air!";
            else if (score > 50) msgBox.innerText = "🍭 A Sweet Match!";
            else if (score > 25) msgBox.innerText = "😬 Yikes... Maybe friends?";
            else msgBox.innerText = "💔 Oof. The meter says... Nope!";

            if (score === 100) {
                nb.classList.add('ultra-love');
                celebrationTimeout = setTimeout(() => nb.classList.remove('ultra-love'), 5000);
                celebrate(true);
            } else if (score > 50) {
                celebrate(false);
            }
        } else {
            current++;
            pctDisp.innerText = current + "%";
        }
    }, 15);
}

function celebrate(isUltra) {
    const count = isUltra ? 50 : 15;
    const nb = document.querySelector('.notebook');
    for (let i = 0; i < count; i++) {
        setTimeout(() => {
            const s = document.createElement('div');
            s.className = 'sparkle';
            s.innerHTML = isUltra ? ['💖','✨','⭐','🌈'][Math.floor(Math.random()*4)] : '💖';
            
            s.style.left = '50%';
            s.style.top = '50%';
            
            const vx = (Math.random() - 0.5) * 400;
            const vy = (Math.random() - 0.5) * 400;
            s.style.setProperty('--vx', `${vx}px`);
            s.style.setProperty('--vy', `${vy}px`);
            
            nb.appendChild(s);
            setTimeout(() => s.remove(), 1000);
        }, i * (isUltra ? 20 : 50));
    }
}
</script>
</body>
</html>
