<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>File Transfer</title>
  <link rel="stylesheet" href="/css/style.css">
  <script src="/js/style.js" defer></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    h1 { font-size: 1.1rem; font-weight: normal; margin-bottom: 4px; border-bottom: 1px solid #000; padding-bottom: 10px; }
    .subtitle { font-size: 0.75rem; opacity: 0.5; padding-top: 6px; margin-bottom: 20px; }
    .mode-row { display: flex; gap: 8px; margin-bottom: 24px; }
    button {
      font-family: 'Courier New', Courier, monospace;
      font-size: 0.9rem;
      background: #fff; color: #000;
      border: 1px solid #000;
      padding: 7px 16px; cursor: pointer;
    }
    button:hover:not(:disabled) { background: #000; color: #fff; }
    button:disabled { opacity: 0.35; cursor: default; }
    button.active { background: #000; color: #fff; }
    .label { font-size: 0.8rem; margin-bottom: 6px; opacity: 0.6; }
    .status-line { font-size: 0.85rem; margin: 10px 0; min-height: 1.2em; }
    #code-display {
      font-size: 2.2rem; letter-spacing: 0.25em;
      border: 1px solid #000; padding: 12px 20px;
      display: inline-block; margin-bottom: 14px;
    }
    #qr-wrap { margin-bottom: 14px; }
    #qr-wrap canvas, #qr-wrap img { display: block; image-rendering: pixelated; }
    input[type="text"] {
      font-family: 'Courier New', Courier, monospace;
      font-size: 1.4rem; letter-spacing: 0.2em;
      border: 1px solid #000; padding: 8px 10px;
      width: 160px; background: #fff; color: #000; outline: none;
    }
    input[type="file"] { font-family: 'Courier New', Courier, monospace; font-size: 0.85rem; }
    .progress-wrap { border: 1px solid #000; height: 14px; width: 100%; margin-top: 10px; }
    .progress-bar { height: 100%; background: #000; width: 0%; transition: width 0.08s linear; }
    #download-area { margin-top: 14px; }
    #download-area a { font-family: 'Courier New', Courier, monospace; font-size: 0.95rem; color: #000; text-decoration: underline; }
    .section { margin-top: 16px; }
    #send-ui, #recv-ui { display: none; }
  </style>
</head>
<body>

  <h1>[ file transfer ]</h1>
  <div class="subtitle">local network &middot; end-to-end encrypted</div>

  <div class="mode-row">
    <button id="btn-send-mode">send</button>
    <button id="btn-recv-mode">receive</button>
  </div>

  <!-- SEND -->
  <div id="send-ui">
    <div class="label">your code — share with receiver:</div>
    <div id="code-display">------</div>
    <div class="label">or scan:</div>
    <div id="qr-wrap"></div>
    <div class="status-line" id="send-status">initialising...</div>

    <div id="file-section" style="display:none">
      <div class="section">
        <input type="file" id="file-input">
        <br><br>
        <button id="btn-send-file">send file</button>
      </div>
      <div class="progress-wrap" id="s-pw" style="display:none"><div class="progress-bar" id="s-pb"></div></div>
      <div class="status-line" id="send-file-status"></div>
    </div>
  </div>

  <!-- RECEIVE -->
  <div id="recv-ui">
    <div class="label">enter sender code:</div>
    <input type="text" id="code-input" maxlength="6" placeholder="ABC123" autocomplete="off" spellcheck="false">
    <br><br>
    <button id="btn-connect">connect</button>
    <div class="status-line" id="recv-status"></div>
    <div class="progress-wrap" id="r-pw" style="display:none"><div class="progress-bar" id="r-pb"></div></div>
    <div id="download-area"></div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script type="module">
    import { initializeApp }        from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
    import { getDatabase, ref, set, onValue, remove, get }
      from "https://www.gstatic.com/firebasejs/12.10.0/firebase-database.js";

    const firebaseConfig = {
      apiKey:            "AIzaSyBp7xO_MO-mRTPpKctSxUhvh_yAFAOUEhQ",
      authDomain:        "alintras-34e4a.firebaseapp.com",
      databaseURL:       "https://alintras-34e4a-default-rtdb.europe-west1.firebasedatabase.app",
      projectId:         "alintras-34e4a",
      storageBucket:     "alintras-34e4a.firebasestorage.app",
      messagingSenderId: "511873774665",
      appId:             "1:511873774665:web:be8946f5bb146f3eb3bb98"
    };

    const app = initializeApp(firebaseConfig);
    const db  = getDatabase(app);

    // ── WebRTC config: no STUN/TURN = local network only ────────────────────
    const PC_CONFIG = { iceServers: [] };

    const CHUNK_SIZE   = 64 * 1024;
    const MAX_BUFFERED = 1024 * 1024;
    const SESSION_TTL  = 2 * 60 * 1000; // 2 min auto-cleanup

    // ── SW streaming ────────────────────────────────────────────────────────
    let swReady = false;
    if ('serviceWorker' in navigator)
      navigator.serviceWorker.ready.then(r => { if (r.active) swReady = true; });

    function randId() { return Math.random().toString(36).slice(2,10) + Math.random().toString(36).slice(2,10); }
    function waitSwReady(id) {
      return new Promise(resolve => {
        function h(e) { if (e.data?.type==='STREAM_READY' && e.data.id===id) { navigator.serviceWorker.removeEventListener('message',h); resolve(); } }
        navigator.serviceWorker.addEventListener('message', h);
        setTimeout(resolve, 500);
      });
    }

    // ── helpers ─────────────────────────────────────────────────────────────
    function randomCode() {
      const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
      let c = ''; for (let i=0;i<6;i++) c += chars[Math.floor(Math.random()*chars.length)]; return c;
    }

    function waitIce(pc) {
      return new Promise(resolve => {
        if (pc.iceGatheringState === 'complete') { resolve(); return; }
        const h = () => { if (pc.iceGatheringState==='complete') { pc.removeEventListener('icegatheringstatechange',h); resolve(); } };
        pc.addEventListener('icegatheringstatechange', h);
        setTimeout(resolve, 5000);
      });
    }

    function showDownloadLink(url, filename) {
      const a = document.createElement('a');
      a.href = url; a.download = filename;
      a.textContent = '[ download ' + filename + ' ]';
      const area = document.getElementById('download-area');
      area.innerHTML = ''; area.appendChild(a); a.click();
    }

    // ── mode buttons ────────────────────────────────────────────────────────
    const btnSend = document.getElementById('btn-send-mode');
    const btnRecv = document.getElementById('btn-recv-mode');
    btnSend.onclick = () => { btnSend.classList.add('active'); btnRecv.classList.remove('active'); startSend(); };
    btnRecv.onclick = () => { btnRecv.classList.add('active'); btnSend.classList.remove('active'); startRecv(); };

    const urlCode = new URLSearchParams(location.search).get('code');
    if (urlCode) { btnRecv.classList.add('active'); startRecv(urlCode.toUpperCase()); }

    // ════════════════════════════════════════════════════════════════════════
    // SEND
    // ════════════════════════════════════════════════════════════════════════
    async function startSend() {
      document.getElementById('recv-ui').style.display = 'none';
      document.getElementById('send-ui').style.display = 'block';
      document.getElementById('file-section').style.display = 'none';

      const code    = randomCode();
      const session = ref(db, 'transfer/' + code);

      document.getElementById('code-display').textContent = code;
      document.getElementById('send-status').textContent  = 'setting up...';

      // QR points to this page with ?code= so receiver auto-fills
      const qrWrap = document.getElementById('qr-wrap');
      qrWrap.innerHTML = '';
      new QRCode(qrWrap, {
        text: location.origin + location.pathname + '?code=' + code,
        width: 140, height: 140, colorDark: '#000', colorLight: '#fff'
      });

      const pc = new RTCPeerConnection(PC_CONFIG);
      const dc = pc.createDataChannel('ft', { ordered: true });

      // Gather ICE candidates into the offer SDP
      const offer = await pc.createOffer();
      await pc.setLocalDescription(offer);
      await waitIce(pc);

      // Write offer to Firebase
      await set(session, {
        offer: { type: pc.localDescription.type, sdp: pc.localDescription.sdp },
        ts: Date.now()
      });

      document.getElementById('send-status').textContent = 'waiting for receiver...';

      // Schedule cleanup so stale sessions don't pile up
      setTimeout(() => remove(session), SESSION_TTL);

      // Watch for answer
      const unsub = onValue(session, async snap => {
        const data = snap.val();
        if (!data?.answer) return;
        unsub(); // stop listening
        await pc.setRemoteDescription(data.answer);
        // Clean up Firebase — handshake done, connection is local from here
        remove(session);
      });

      dc.onopen = () => {
        document.getElementById('send-status').textContent = 'connected.';
        document.getElementById('file-section').style.display = 'block';
        setupSendFile(dc);
      };

      pc.onconnectionstatechange = () => {
        if (pc.connectionState === 'failed')
          document.getElementById('send-status').textContent = 'connection failed. reload and try again.';
      };
    }

    function setupSendFile(dc) {
      document.getElementById('btn-send-file').onclick = () => {
        const file = document.getElementById('file-input').files[0];
        if (!file) { document.getElementById('send-file-status').textContent = 'no file selected.'; return; }
        document.getElementById('btn-send-file').disabled = true;
        const reader = new FileReader();
        reader.onload = e => {
          const buf = e.target.result;
          const totalChunks = Math.ceil(buf.byteLength / CHUNK_SIZE);
          dc.send(JSON.stringify({ type:'meta', name:file.name, size:file.size, totalChunks }));
          document.getElementById('s-pw').style.display = 'block';
          const bar = document.getElementById('s-pb');
          let i = 0;
          function next() {
            if (i >= totalChunks) { document.getElementById('send-file-status').textContent = 'done.'; return; }
            if (dc.bufferedAmount > MAX_BUFFERED) { setTimeout(next, 50); return; }
            dc.send(buf.slice(i * CHUNK_SIZE, (i+1) * CHUNK_SIZE));
            bar.style.width = ((i+1)/totalChunks*100) + '%';
            document.getElementById('send-file-status').textContent = 'sending... ' + Math.round((i+1)/totalChunks*100) + '%';
            i++; setTimeout(next, 0);
          }
          next();
        };
        reader.readAsArrayBuffer(file);
      };
    }

    // ════════════════════════════════════════════════════════════════════════
    // RECEIVE
    // ════════════════════════════════════════════════════════════════════════
    function startRecv(prefill) {
      document.getElementById('send-ui').style.display = 'none';
      document.getElementById('recv-ui').style.display = 'block';
      if (prefill) document.getElementById('code-input').value = prefill;

      document.getElementById('btn-connect').onclick = async () => {
        const code = document.getElementById('code-input').value.trim().toUpperCase();
        if (code.length !== 6) { document.getElementById('recv-status').textContent = 'enter a 6-character code.'; return; }

        document.getElementById('btn-connect').disabled = true;
        document.getElementById('recv-status').textContent = 'looking up code...';

        const session = ref(db, 'transfer/' + code);
        const snap    = await get(session);
        if (!snap.exists() || !snap.val().offer) {
          document.getElementById('recv-status').textContent = 'code not found or expired.';
          document.getElementById('btn-connect').disabled = false;
          return;
        }

        document.getElementById('recv-status').textContent = 'connecting...';

        const pc = new RTCPeerConnection(PC_CONFIG);
        await pc.setRemoteDescription(snap.val().offer);
        const answer = await pc.createAnswer();
        await pc.setLocalDescription(answer);
        await waitIce(pc);

        // Write answer — sender picks it up and removes the session
        await set(ref(db, 'transfer/' + code + '/answer'), { type: pc.localDescription.type, sdp: pc.localDescription.sdp });

        pc.ondatachannel = e => {
          const dc = e.channel;
          dc.binaryType = 'arraybuffer';
          document.getElementById('recv-status').textContent = 'connected. waiting for file...';
          setupRecv(dc);
        };

        pc.onconnectionstatechange = () => {
          if (pc.connectionState === 'failed')
            document.getElementById('recv-status').textContent = 'connection failed. reload and try again.';
        };
      };
    }

    async function setupRecv(dc) {
      let meta=null, transferId=null, fallbackChunks=[], received=0, usingSW=false;
      dc.onmessage = async e => {
        if (typeof e.data === 'string') {
          const msg = JSON.parse(e.data);
          if (msg.type !== 'meta') return;
          meta=msg; received=0; fallbackChunks=[]; transferId=randId();
          usingSW = swReady && !!navigator.serviceWorker.controller;
          document.getElementById('r-pw').style.display = 'block';
          document.getElementById('r-pb').style.width   = '0%';
          document.getElementById('recv-status').textContent = 'receiving: ' + meta.name;
          document.getElementById('download-area').innerHTML = '';
          if (usingSW) {
            const rp = waitSwReady(transferId);
            navigator.serviceWorker.controller.postMessage({ type:'STREAM_CREATE', id:transferId, filename:meta.name, size:meta.size });
            await rp;
            showDownloadLink('/sw-transfer/' + transferId, meta.name);
          }
        } else {
          received++;
          const pct = Math.round(received / meta.totalChunks * 100);
          document.getElementById('r-pb').style.width = pct + '%';
          document.getElementById('recv-status').textContent = 'receiving: ' + meta.name + ' — ' + pct + '%';
          if (usingSW) {
            navigator.serviceWorker.controller.postMessage({ type:'STREAM_CHUNK', id:transferId, chunk:e.data }, [e.data]);
            if (received === meta.totalChunks) {
              navigator.serviceWorker.controller.postMessage({ type:'STREAM_END', id:transferId });
              document.getElementById('recv-status').textContent = 'transfer complete.';
            }
          } else {
            fallbackChunks.push(e.data);
            if (received === meta.totalChunks) {
              showDownloadLink(URL.createObjectURL(new Blob(fallbackChunks)), meta.name);
              document.getElementById('recv-status').textContent = 'transfer complete.';
            }
          }
        }
      };
    }
  </script>
</body>
</html>
