<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>file transfer</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Courier New', Courier, monospace;
      background: #fff;
      color: #000;
      padding: 24px 20px;
      max-width: 560px;
      margin: 0 auto;
    }

    h1 {
      font-size: 1.1rem;
      font-weight: normal;
      margin-bottom: 20px;
      border-bottom: 1px solid #000;
      padding-bottom: 10px;
    }

    .mode-row {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
    }

    button {
      font-family: 'Courier New', Courier, monospace;
      font-size: 0.9rem;
      background: #fff;
      color: #000;
      border: 1px solid #000;
      padding: 7px 16px;
      cursor: pointer;
    }
    button:hover:not(:disabled) { background: #000; color: #fff; }
    button:disabled { opacity: 0.35; cursor: default; }
    button.active { background: #000; color: #fff; }

    input[type="text"] {
      font-family: 'Courier New', Courier, monospace;
      font-size: 1.4rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      border: 1px solid #000;
      padding: 8px 10px;
      width: 160px;
      background: #fff;
      color: #000;
      outline: none;
    }

    input[type="file"] {
      font-family: 'Courier New', Courier, monospace;
      font-size: 0.85rem;
    }

    .label {
      font-size: 0.8rem;
      margin-bottom: 6px;
      opacity: 0.6;
    }

    #code-display {
      font-size: 2.2rem;
      letter-spacing: 0.25em;
      border: 1px solid #000;
      padding: 12px 20px;
      display: inline-block;
      margin-bottom: 14px;
    }

    #qr-wrap { margin-bottom: 14px; }
    #qr-wrap canvas, #qr-wrap img {
      display: block;
      image-rendering: pixelated;
    }

    .status-line {
      font-size: 0.85rem;
      margin: 10px 0;
      min-height: 1.2em;
    }

    .progress-wrap {
      border: 1px solid #000;
      height: 14px;
      width: 100%;
      margin-top: 10px;
    }
    .progress-bar {
      height: 100%;
      background: #000;
      width: 0%;
      transition: width 0.08s linear;
    }

    #download-area { margin-top: 14px; }
    #download-area a {
      font-family: 'Courier New', Courier, monospace;
      font-size: 0.95rem;
      color: #000;
      text-decoration: underline;
    }

    .section { margin-top: 16px; }
    #send-ui, #recv-ui { display: none; }
    #sw-warning {
      font-size: 0.8rem;
      border: 1px solid #000;
      padding: 8px 10px;
      margin-bottom: 16px;
      display: none;
    }
  </style>
</head>
<body>

  <h1>[ file transfer ]</h1>

  <div id="sw-warning">
    note: service worker not available — large files will be assembled in memory instead.
  </div>

  <div class="mode-row">
    <button id="btn-send-mode">send</button>
    <button id="btn-recv-mode">receive</button>
  </div>

  <!-- SEND -->
  <div id="send-ui">
    <div class="label">your code — share with receiver:</div>
    <div id="code-display">------</div>
    <div class="label">or scan:</div>
    <div id="qr-wrap"></div>
    <div class="status-line" id="send-connect-status">waiting for receiver...</div>

    <div id="file-section" style="display:none">
      <div class="section">
        <input type="file" id="file-input">
        <br><br>
        <button id="btn-send-file">send file</button>
      </div>
      <div id="progress-wrap-s" class="progress-wrap" style="display:none">
        <div id="progress-bar-s" class="progress-bar"></div>
      </div>
      <div class="status-line" id="send-file-status"></div>
    </div>
  </div>

  <!-- RECEIVE -->
  <div id="recv-ui">
    <div class="label">enter sender code:</div>
    <input type="text" id="code-input" maxlength="6" placeholder="ABC123" autocomplete="off" spellcheck="false">
    <br><br>
    <button id="btn-connect">connect</button>
    <div class="status-line" id="recv-status"></div>
    <div id="progress-wrap-r" class="progress-wrap" style="display:none">
      <div id="progress-bar-r" class="progress-bar"></div>
    </div>
    <div id="download-area"></div>
  </div>

  <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script>
    const CHUNK_SIZE = 64 * 1024;
    const MAX_BUFFERED = 1024 * 1024;

    // ── Service Worker ──────────────────────────────────────────────────────
    let swReady = false;

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.ready.then(reg => {
        if (reg.active) swReady = true;
      });
    } else {
      document.getElementById('sw-warning').style.display = 'block';
    }

    function randId() {
      return Math.random().toString(36).slice(2, 10) + Math.random().toString(36).slice(2, 10);
    }

    function waitSwReady(id) {
      return new Promise(resolve => {
        function handler(e) {
          if (e.data?.type === 'STREAM_READY' && e.data.id === id) {
            navigator.serviceWorker.removeEventListener('message', handler);
            resolve();
          }
        }
        navigator.serviceWorker.addEventListener('message', handler);
        // Timeout fallback — if SW doesn't reply in 500ms, just proceed
        setTimeout(resolve, 500);
      });
    }
    // ───────────────────────────────────────────────────────────────────────

    const btnSendMode = document.getElementById('btn-send-mode');
    const btnRecvMode = document.getElementById('btn-recv-mode');
    const sendUI = document.getElementById('send-ui');
    const recvUI = document.getElementById('recv-ui');

    function randomCode() {
      const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
      let c = '';
      for (let i = 0; i < 6; i++) c += chars[Math.floor(Math.random() * chars.length)];
      return c;
    }

    btnSendMode.onclick = () => { btnSendMode.classList.add('active'); btnRecvMode.classList.remove('active'); startSendMode(); };
    btnRecvMode.onclick = () => { btnRecvMode.classList.add('active'); btnSendMode.classList.remove('active'); startRecvMode(); };

    const urlCode = new URLSearchParams(window.location.search).get('code');
    if (urlCode) {
      btnRecvMode.classList.add('active');
      startRecvMode(urlCode.toUpperCase());
    }

    // ── SEND ────────────────────────────────────────────────────────────────
    function startSendMode() {
      sendUI.style.display = 'block';
      recvUI.style.display = 'none';

      const code = randomCode();
      document.getElementById('code-display').textContent = code;

      const qrWrap = document.getElementById('qr-wrap');
      qrWrap.innerHTML = '';
      const pageUrl = location.origin + location.pathname + '?code=' + code;
      new QRCode(qrWrap, { text: pageUrl, width: 140, height: 140, colorDark: '#000000', colorLight: '#ffffff' });

      document.getElementById('send-connect-status').textContent = 'waiting for receiver...';
      document.getElementById('file-section').style.display = 'none';

      const peer = new Peer(code);

      peer.on('error', err => {
        if (err.type === 'unavailable-id') { peer.destroy(); startSendMode(); }
        else document.getElementById('send-connect-status').textContent = 'error: ' + err.message;
      });

      peer.on('connection', conn => {
        document.getElementById('send-connect-status').textContent = 'receiver connected.';
        document.getElementById('file-section').style.display = 'block';

        const btnSend = document.getElementById('btn-send-file');
        btnSend.onclick = () => {
          const file = document.getElementById('file-input').files[0];
          if (!file) { document.getElementById('send-file-status').textContent = 'no file selected.'; return; }

          btnSend.disabled = true;
          const reader = new FileReader();
          reader.onload = e => {
            const buffer = e.target.result;
            const totalChunks = Math.ceil(buffer.byteLength / CHUNK_SIZE);
            conn.send(JSON.stringify({ type: 'meta', name: file.name, size: file.size, totalChunks }));

            document.getElementById('progress-wrap-s').style.display = 'block';
            const bar = document.getElementById('progress-bar-s');

            let i = 0;
            function sendNext() {
              if (i >= totalChunks) { document.getElementById('send-file-status').textContent = 'done.'; return; }
              if (conn.dataChannel && conn.dataChannel.bufferedAmount > MAX_BUFFERED) { setTimeout(sendNext, 50); return; }
              conn.send(buffer.slice(i * CHUNK_SIZE, (i + 1) * CHUNK_SIZE));
              bar.style.width = ((i + 1) / totalChunks * 100) + '%';
              document.getElementById('send-file-status').textContent = 'sending... ' + Math.round((i + 1) / totalChunks * 100) + '%';
              i++;
              setTimeout(sendNext, 0);
            }
            sendNext();
          };
          reader.readAsArrayBuffer(file);
        };
      });
    }

    // ── RECEIVE ─────────────────────────────────────────────────────────────
    function startRecvMode(prefill) {
      recvUI.style.display = 'block';
      sendUI.style.display = 'none';
      if (prefill) document.getElementById('code-input').value = prefill;

      const btnConnect = document.getElementById('btn-connect');
      btnConnect.onclick = () => {
        const code = document.getElementById('code-input').value.trim().toUpperCase();
        if (code.length !== 6) { document.getElementById('recv-status').textContent = 'enter a 6-character code.'; return; }

        btnConnect.disabled = true;
        document.getElementById('recv-status').textContent = 'connecting...';

        const peer = new Peer();
        const conn = peer.connect(code, { reliable: true });

        let meta = null;
        let transferId = null;
        let fallbackChunks = [];
        let received = 0;
        let usingSW = false;

        conn.on('open', () => {
          document.getElementById('recv-status').textContent = 'connected. waiting for file...';
        });

        conn.on('data', async data => {
          if (typeof data === 'string') {
            const msg = JSON.parse(data);
            if (msg.type !== 'meta') return;

            meta = msg;
            received = 0;
            fallbackChunks = [];
            transferId = randId();
            usingSW = swReady && !!navigator.serviceWorker.controller;

            document.getElementById('progress-wrap-r').style.display = 'block';
            document.getElementById('progress-bar-r').style.width = '0%';
            document.getElementById('recv-status').textContent = 'receiving: ' + meta.name;
            document.getElementById('download-area').innerHTML = '';

            if (usingSW) {
              const readyPromise = waitSwReady(transferId);
              navigator.serviceWorker.controller.postMessage({
                type: 'STREAM_CREATE', id: transferId, filename: meta.name, size: meta.size
              });
              await readyPromise;
              showDownloadLink('/sw-transfer/' + transferId, meta.name, true);
            }

          } else {
            // ArrayBuffer chunk
            received++;
            const pct = Math.round(received / meta.totalChunks * 100);
            document.getElementById('progress-bar-r').style.width = pct + '%';
            document.getElementById('recv-status').textContent = 'receiving: ' + meta.name + ' — ' + pct + '%';

            if (usingSW) {
              navigator.serviceWorker.controller.postMessage(
                { type: 'STREAM_CHUNK', id: transferId, chunk: data },
                [data]  // transfer ownership — zero copy
              );
              if (received === meta.totalChunks) {
                navigator.serviceWorker.controller.postMessage({ type: 'STREAM_END', id: transferId });
                document.getElementById('recv-status').textContent = 'transfer complete.';
              }
            } else {
              fallbackChunks.push(data);
              if (received === meta.totalChunks) {
                const url = URL.createObjectURL(new Blob(fallbackChunks));
                showDownloadLink(url, meta.name, true);
                document.getElementById('recv-status').textContent = 'transfer complete.';
              }
            }
          }
        });

        conn.on('error', err => { document.getElementById('recv-status').textContent = 'error: ' + err.message; btnConnect.disabled = false; });
        peer.on('error', err => { document.getElementById('recv-status').textContent = 'peer error: ' + err.message; btnConnect.disabled = false; });
      };
    }

    function showDownloadLink(url, filename, autoClick) {
      const a = document.createElement('a');
      a.href = url;
      a.download = filename;
      a.textContent = '[ download ' + filename + ' ]';
      const area = document.getElementById('download-area');
      area.innerHTML = '';
      area.appendChild(a);
      if (autoClick) a.click(); // no-op on iOS Safari — user taps the link manually
    }
  </script>
</body>
</html>
