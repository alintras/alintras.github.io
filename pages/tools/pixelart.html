<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pixel Art Editor</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: monospace; background: #fff; color: #000; padding: 12px; }
a { color: inherit; text-decoration: none; }
h1 { font-size: 1.2em; margin: 12px 0; font-weight: bold; }

#controls { display: flex; flex-direction: column; gap: 8px; margin-bottom: 14px; }
.control-group { display: flex; align-items: center; flex-wrap: wrap; gap: 5px; }
.control-group > label:first-child { min-width: 60px; font-size: 0.85em; }

button {
font-family: monospace; font-size: 0.85em;
background: #fff; color: #000; border: 1px solid #000;
padding: 5px 10px; cursor: pointer; touch-action: manipulation;
min-height: 32px;
}
button:hover, button:active { background: #eee; }
button.active { background: #000; color: #fff; }

#size-btns, #tool-btns { display: flex; flex-wrap: wrap; gap: 4px; }

#palette { display: flex; flex-wrap: wrap; gap: 3px; }
.palette-swatch {
width: 26px; height: 26px;
border: 1px solid #000; cursor: pointer;
touch-action: manipulation;
}
.palette-swatch.active { outline: 2px solid #000; outline-offset: 1px; }

#custom-color {
width: 32px; height: 26px;
border: 1px solid #000; padding: 0; cursor: pointer; background: none;
}
#active-color-display {
width: 26px; height: 26px;
border: 1px solid #000; display: inline-block; vertical-align: middle;
}

#canvas-wrapper {
overflow: auto;
border: 1px solid #000;
display: block;
cursor: crosshair;
line-height: 0;
max-width: 100%;
touch-action: none;
}
#canvas { display: block; image-rendering: pixelated; }

#bottom-controls { display: flex; flex-wrap: wrap; align-items: center; gap: 6px; margin-top: 8px; }
#bottom-controls label { font-size: 0.85em; display: flex; align-items: center; gap: 4px; }
</style>

</head>
<body>
<a href="/../index.html"><img src="/assets/smileys/home.jpg" style="width:24px;height:24px;vertical-align:-7px;image-rendering:pixelated;"> Home</a>
<h1>Pixel Art Editor</h1>
<div id="controls">
  <div class="control-group">
    <label>Size:</label>
    <div id="size-btns">
      <button class="size-btn active" data-size="16">16×16</button>
      <button class="size-btn" data-size="32">32×32</button>
      <button class="size-btn" data-size="64">64×64</button>
    </div>
  </div>
  <div class="control-group">
    <label>Tool:</label>
    <div id="tool-btns">
      <button class="tool-btn active" data-tool="draw">✏ Draw</button>
      <button class="tool-btn" data-tool="fill">⬛ Fill</button>
      <button class="tool-btn" data-tool="erase">✕ Erase</button>
      <button class="tool-btn" data-tool="eyedrop">⊙ Pick</button>
    </div>
  </div>
  <div class="control-group">
    <label>Color:</label>
    <div id="palette"></div>
    <input type="color" id="custom-color" value="#000000" title="Custom color">
    <span id="active-color-display"></span>
  </div>
</div>

<div id="canvas-wrapper">
  <canvas id="canvas"></canvas>
</div>

<div id="bottom-controls">
  <button id="clear-btn">Clear</button>
  <button id="save-btn">Save PNG</button>
  <label><input type="checkbox" id="transparent-white" checked> White = transparent</label>
</div>

<script>
(function () {
  const PALETTE = [
    "#000000","#ffffff","#ff0000","#00cc00","#0000ff",
    "#ffff00","#ff8800","#ff00ff","#00ccff","#884400",
    "#ffaaaa","#aaffaa","#aaaaff","#ffddaa","#cccccc",
    "#555555","#880000","#006600","#000088","#886600",
    "#ff6688","#44aaff","#88ff44","#ff44aa","#44ffee",
    "#eeeeee","#222222","#664400","#003366","#006644",
  ];

  const canvas = document.getElementById("canvas");
  const ctx = canvas.getContext("2d");
  const paletteEl = document.getElementById("palette");
  const customColorInput = document.getElementById("custom-color");
  const activeColorDisplay = document.getElementById("active-color-display");
  const clearBtn = document.getElementById("clear-btn");
  const saveBtn = document.getElementById("save-btn");
  const transparentWhiteCheck = document.getElementById("transparent-white");

  let gridSize = 16;
  let cellSize = 16;
  let pixels = [];
  let activeColor = "#000000";
  let activeTool = "draw";
  let isPointerDown = false;
  let lastCell = null;

  function calcCellSize(size) {
    const available = Math.min(window.innerWidth - 26, 600);
    return Math.max(4, Math.floor(available / size));
  }

  function initGrid() {
    cellSize = calcCellSize(gridSize);
    pixels = Array.from({ length: gridSize }, () => Array(gridSize).fill("#ffffff"));
    canvas.width = gridSize * cellSize;
    canvas.height = gridSize * cellSize;
    redraw();
  }

  function redraw() {
    for (let r = 0; r < gridSize; r++)
      for (let c = 0; c < gridSize; c++)
        drawCell(r, c);
    drawGrid();
  }

  function drawCell(r, c) {
    ctx.fillStyle = pixels[r][c];
    ctx.fillRect(c * cellSize, r * cellSize, cellSize, cellSize);
  }

  function drawGrid() {
    ctx.strokeStyle = "#aaaaaa";
    ctx.lineWidth = 1;
    for (let i = 0; i <= gridSize; i++) {
      ctx.beginPath();
      ctx.moveTo(i * cellSize, 0);
      ctx.lineTo(i * cellSize, gridSize * cellSize);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(0, i * cellSize);
      ctx.lineTo(gridSize * cellSize, i * cellSize);
      ctx.stroke();
    }
  }

  function getCellFromXY(x, y) {
    const c = Math.floor(x / cellSize);
    const r = Math.floor(y / cellSize);
    if (r < 0 || r >= gridSize || c < 0 || c >= gridSize) return null;
    return { r, c };
  }

  function getCellFromEvent(e) {
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width / rect.width;
    const scaleY = canvas.height / rect.height;
    return getCellFromXY(
      (e.clientX - rect.left) * scaleX,
      (e.clientY - rect.top) * scaleY
    );
  }

  function applyTool(cell) {
    if (!cell) return;
    const { r, c } = cell;
    if (activeTool === "draw") {
      pixels[r][c] = activeColor;
      drawCell(r, c);
      drawGrid();
    } else if (activeTool === "erase") {
      pixels[r][c] = "#ffffff";
      drawCell(r, c);
      drawGrid();
    } else if (activeTool === "eyedrop") {
      setActiveColor(pixels[r][c]);
      setTool("draw");
    } else if (activeTool === "fill") {
      floodFill(r, c, pixels[r][c], activeColor);
      redraw();
    }
  }

  function floodFill(r, c, targetColor, fillColor) {
    if (targetColor === fillColor) return;
    const stack = [[r, c]];
    const visited = Array.from({ length: gridSize }, () => Array(gridSize).fill(false));
    while (stack.length) {
      const [cr, cc] = stack.pop();
      if (cr < 0 || cr >= gridSize || cc < 0 || cc >= gridSize) continue;
      if (visited[cr][cc] || pixels[cr][cc] !== targetColor) continue;
      visited[cr][cc] = true;
      pixels[cr][cc] = fillColor;
      stack.push([cr-1,cc],[cr+1,cc],[cr,cc-1],[cr,cc+1]);
    }
  }

  function setActiveColor(hex) {
    activeColor = hex;
    activeColorDisplay.style.background = hex;
    customColorInput.value = hex;
    document.querySelectorAll(".palette-swatch").forEach(s =>
      s.classList.toggle("active", s.dataset.color === hex)
    );
  }

  function setTool(tool) {
    activeTool = tool;
    document.querySelectorAll(".tool-btn").forEach(b =>
      b.classList.toggle("active", b.dataset.tool === tool)
    );
  }

  // Palette
  PALETTE.forEach(color => {
    const swatch = document.createElement("div");
    swatch.className = "palette-swatch";
    swatch.style.background = color;
    swatch.dataset.color = color;
    swatch.title = color;
    swatch.addEventListener("click", () => setActiveColor(color));
    paletteEl.appendChild(swatch);
  });

  // Size buttons
  document.querySelectorAll(".size-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      document.querySelectorAll(".size-btn").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      gridSize = parseInt(btn.dataset.size);
      initGrid();
    });
  });

  // Tool buttons
  document.querySelectorAll(".tool-btn").forEach(btn =>
    btn.addEventListener("click", () => setTool(btn.dataset.tool))
  );

  customColorInput.addEventListener("input", () => setActiveColor(customColorInput.value));

  // Pointer events (mouse + touch unified)
  canvas.addEventListener("pointerdown", e => {
    e.preventDefault();
    canvas.setPointerCapture(e.pointerId);
    isPointerDown = true;
    const cell = getCellFromEvent(e);
    lastCell = cell;
    applyTool(cell);
  });

  canvas.addEventListener("pointermove", e => {
    if (!isPointerDown) return;
    const cell = getCellFromEvent(e);
    if (!cell || (lastCell && cell.r === lastCell.r && cell.c === lastCell.c)) return;
    lastCell = cell;
    if (activeTool === "fill" || activeTool === "eyedrop") return;
    applyTool(cell);
  });

  canvas.addEventListener("pointerup", () => { isPointerDown = false; lastCell = null; });
  canvas.addEventListener("pointercancel", () => { isPointerDown = false; lastCell = null; });

  // Resize
  window.addEventListener("resize", () => {
    const newCellSize = calcCellSize(gridSize);
    if (newCellSize !== cellSize) {
      cellSize = newCellSize;
      canvas.width = gridSize * cellSize;
      canvas.height = gridSize * cellSize;
      redraw();
    }
  });

  clearBtn.addEventListener("click", () => {
    pixels = Array.from({ length: gridSize }, () => Array(gridSize).fill("#ffffff"));
    redraw();
  });

  saveBtn.addEventListener("click", () => {
    const whiteTransparent = transparentWhiteCheck.checked;
    const exp = document.createElement("canvas");
    exp.width = gridSize;
    exp.height = gridSize;
    const ectx = exp.getContext("2d");
    if (!whiteTransparent) { ectx.fillStyle = "#fff"; ectx.fillRect(0, 0, gridSize, gridSize); }
    for (let r = 0; r < gridSize; r++)
      for (let c = 0; c < gridSize; c++) {
        const color = pixels[r][c];
        if (whiteTransparent && color.toLowerCase() === "#ffffff") continue;
        ectx.fillStyle = color;
        ectx.fillRect(c, r, 1, 1);
      }
    const link = document.createElement("a");
    link.download = `pixelart_${gridSize}x${gridSize}.png`;
    link.href = exp.toDataURL("image/png");
    link.click();
  });

  setActiveColor("#000000");
  initGrid();
})();
</script>

</body>
</html>
