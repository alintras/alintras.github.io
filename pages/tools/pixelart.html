<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pixel Art Editor</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: monospace; background: #fff; color: #000; padding: 12px; }
a { color: inherit; text-decoration: none; }
h1 { font-size: 1.2em; margin: 12px 0; font-weight: bold; }

#controls { display: flex; flex-direction: column; gap: 8px; margin-bottom: 14px; }
.control-group { display: flex; align-items: center; flex-wrap: wrap; gap: 5px; }
.control-group > label:first-child { min-width: 60px; font-size: 0.85em; }

button {
font-family: monospace; font-size: 0.85em;
background: #fff; color: #000; border: 1px solid #000;
padding: 5px 10px; cursor: pointer; touch-action: manipulation;
min-height: 32px;
}
button:hover, button:active { background: #eee; }
button.active { background: #000; color: #fff; }
button:disabled { opacity: 0.35; cursor: default; background: #fff; color: #000; }

#size-btns, #tool-btns { display: flex; flex-wrap: wrap; gap: 4px; }

#palette { display: flex; flex-wrap: wrap; gap: 3px; }
.palette-swatch {
width: 26px; height: 26px;
border: 1px solid #000; cursor: pointer;
touch-action: manipulation;
}
/* white swatch gets a diagonal line so it’s visible */
.palette-swatch[data-color=”#ffffff”] {
background: #fff;
background-image: linear-gradient(to bottom right, transparent calc(50% - 0.5px), #ccc calc(50% - 0.5px), #ccc calc(50% + 0.5px), transparent calc(50% + 0.5px));
}
.palette-swatch.active { outline: 2px solid #000; outline-offset: 1px; }

#custom-color { width: 32px; height: 26px; border: 1px solid #000; padding: 0; cursor: pointer; background: none; }
#active-color-display { width: 26px; height: 26px; border: 1px solid #000; display: inline-block; vertical-align: middle; }

#bg-color { width: 32px; height: 26px; border: 1px solid #000; padding: 0; cursor: pointer; background: none; }

#canvas-wrapper {
overflow: auto;
border: 1px solid #000;
display: inline-block;
cursor: crosshair;
line-height: 0;
touch-action: none;
}
#canvas { display: block; image-rendering: pixelated; }

#bottom-controls { display: flex; flex-wrap: wrap; align-items: center; gap: 6px; margin-top: 8px; }
#bottom-controls label { font-size: 0.85em; display: flex; align-items: center; gap: 4px; }
</style>

</head>
<body>
<a href="/../index.html"><img src="/assets/smileys/home.jpg" style="width:24px;height:24px;vertical-align:-7px;image-rendering:pixelated;"> Home</a>
<h1 style="opacity: 0;">Pixel Art Editor</h1>
<div id="controls">
  <div class="control-group">
    <label>Size:</label>
    <div id="size-btns">
      <button class="size-btn" data-size="8">8x8</button>
      <button class="size-btn active" data-size="16">16×16</button>
      <button class="size-btn" data-size="32">32×32</button>
      <button class="size-btn" data-size="64">64×64</button>
    </div>
  </div>
  <div class="control-group">
    <label>Tool:</label>
    <div id="tool-btns">
      <button class="tool-btn active" data-tool="draw">✏ Draw</button>
      <button class="tool-btn" data-tool="fill">⬛ Fill</button>
      <button class="tool-btn" data-tool="erase">✕ Erase</button>
      <button class="tool-btn" data-tool="eyedrop">⊙ Pick</button>
    </div>
  </div>
  <div class="control-group">
    <label>Trace:</label>
    <button id="trace-load-btn">Load image</button>
    <input type="file" id="trace-input" accept="image/*" style="display:none">
    <input type="range" id="trace-opacity" min="10" max="90" value="40" style="width:80px" title="Trace opacity">
    <button id="trace-clear-btn" style="display:none">✕ Remove</button>
    <span style="font-size:0.85em;margin-left:4px;">bg:</span>
    <input type="color" id="bg-color" value="#ffffff" title="Background color">
  </div>
  <div class="control-group">
    <label>Color:</label>
    <div id="palette"></div>
    <input type="color" id="custom-color" value="#000000" title="Custom color">
    <span id="active-color-display"></span>
  </div>
</div>

<div id="canvas-wrapper">
  <canvas id="canvas"></canvas>
</div>

<div id="bottom-controls">
  <button id="undo-btn" disabled>↩ Undo</button>
  <button id="redo-btn" disabled>↪ Redo</button>
  <button id="clear-btn">Clear</button>
  <button id="save-btn">Save PNG</button>
  <label><input type="checkbox" id="transparent-empty" checked> Empty = transparent</label>
</div>

<script>
(function () {
  const PALETTE = [
    "#000000","#ffffff","#ff0000","#00cc00","#0000ff",
    "#ffff00","#ff8800","#ff00ff","#00ccff","#884400",
    "#ffaaaa","#aaffaa","#aaaaff","#ffddaa","#cccccc",
    "#555555","#880000","#006600","#000088","#886600",
    "#ff6688","#44aaff","#88ff44","#ff44aa","#44ffee",
    "#eeeeee","#222222","#664400","#003366","#006644",
  ];

  const canvas = document.getElementById("canvas");
  const ctx = canvas.getContext("2d");
  const paletteEl = document.getElementById("palette");
  const customColorInput = document.getElementById("custom-color");
  const activeColorDisplay = document.getElementById("active-color-display");
  const clearBtn = document.getElementById("clear-btn");
  const saveBtn = document.getElementById("save-btn");
  const transparentEmptyCheck = document.getElementById("transparent-empty");
  const undoBtn = document.getElementById("undo-btn");
  const redoBtn = document.getElementById("redo-btn");
  const bgColorInput = document.getElementById("bg-color");

  let gridSize = 16;
  let cellSize = 16;
  // null = empty (transparent/bg), string = painted color (including #ffffff)
  let pixels = [];
  let activeColor = "#000000";
  let activeTool = "draw";
  let isPointerDown = false;
  let lastCell = null;
  let traceImage = null;
  let traceOpacity = 0.4;
  let bgColor = "#ffffff";

  // Undo/redo: depth 1
  let undoState = null;
  let redoState = null;

  function clonePixels(p) {
    return p.map(row => row.slice());
  }

  function saveUndo() {
    undoState = clonePixels(pixels);
    redoState = null;
    updateUndoRedoBtns();
  }

  function updateUndoRedoBtns() {
    undoBtn.disabled = !undoState;
    redoBtn.disabled = !redoState;
  }

  function calcCellSize(size) {
    const available = Math.min(window.innerWidth - 26, 600);
    return Math.max(4, Math.floor(available / size));
  }

  function initGrid() {
    cellSize = calcCellSize(gridSize);
    pixels = Array.from({ length: gridSize }, () => Array(gridSize).fill(null));
    undoState = null;
    redoState = null;
    updateUndoRedoBtns();
    canvas.width = gridSize * cellSize;
    canvas.height = gridSize * cellSize;
    redraw();
  }

  function redraw() {
    // background color
    ctx.fillStyle = bgColor;
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    // trace image
    if (traceImage) {
      ctx.globalAlpha = traceOpacity;
      ctx.drawImage(traceImage, 0, 0, canvas.width, canvas.height);
      ctx.globalAlpha = 1;
    }
    // painted pixels (null = empty, skip)
    for (let r = 0; r < gridSize; r++)
      for (let c = 0; c < gridSize; c++)
        if (pixels[r][c] !== null) {
          ctx.fillStyle = pixels[r][c];
          ctx.fillRect(c * cellSize, r * cellSize, cellSize, cellSize);
        }
    drawGrid();
  }

  function drawGrid() {
    ctx.strokeStyle = "#aaaaaa";
    ctx.lineWidth = 1;
    for (let i = 0; i <= gridSize; i++) {
      ctx.beginPath();
      ctx.moveTo(i * cellSize, 0);
      ctx.lineTo(i * cellSize, gridSize * cellSize);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(0, i * cellSize);
      ctx.lineTo(gridSize * cellSize, i * cellSize);
      ctx.stroke();
    }
  }

  function getCellFromEvent(e) {
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width / rect.width;
    const scaleY = canvas.height / rect.height;
    const c = Math.floor((e.clientX - rect.left) * scaleX / cellSize);
    const r = Math.floor((e.clientY - rect.top) * scaleY / cellSize);
    if (r < 0 || r >= gridSize || c < 0 || c >= gridSize) return null;
    return { r, c };
  }

  function applyTool(cell) {
    if (!cell) return;
    const { r, c } = cell;
    if (activeTool === "draw") {
      pixels[r][c] = activeColor;
      redraw();
    } else if (activeTool === "erase") {
      pixels[r][c] = null;
      redraw();
    } else if (activeTool === "eyedrop") {
      // pick painted color, or if empty pick bg color
      setActiveColor(pixels[r][c] !== null ? pixels[r][c] : bgColor);
      setTool("draw");
    } else if (activeTool === "fill") {
      floodFill(r, c, pixels[r][c], activeColor);
      redraw();
    }
  }

  function floodFill(r, c, targetColor, fillColor) {
    if (targetColor === fillColor) return;
    const stack = [[r, c]];
    const visited = Array.from({ length: gridSize }, () => Array(gridSize).fill(false));
    while (stack.length) {
      const [cr, cc] = stack.pop();
      if (cr < 0 || cr >= gridSize || cc < 0 || cc >= gridSize) continue;
      if (visited[cr][cc] || pixels[cr][cc] !== targetColor) continue;
      visited[cr][cc] = true;
      pixels[cr][cc] = fillColor;
      stack.push([cr-1,cc],[cr+1,cc],[cr,cc-1],[cr,cc+1]);
    }
  }

  function setActiveColor(hex) {
    activeColor = hex;
    activeColorDisplay.style.background = hex;
    customColorInput.value = hex;
    document.querySelectorAll(".palette-swatch").forEach(s =>
      s.classList.toggle("active", s.dataset.color === hex)
    );
  }

  function setTool(tool) {
    activeTool = tool;
    document.querySelectorAll(".tool-btn").forEach(b =>
      b.classList.toggle("active", b.dataset.tool === tool)
    );
  }

  // Palette
  PALETTE.forEach(color => {
    const swatch = document.createElement("div");
    swatch.className = "palette-swatch";
    if (color !== "#ffffff") swatch.style.background = color;
    swatch.dataset.color = color;
    swatch.title = color === "#ffffff" ? "white" : color;
    swatch.addEventListener("click", () => setActiveColor(color));
    paletteEl.appendChild(swatch);
  });

  // Size buttons
  document.querySelectorAll(".size-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      document.querySelectorAll(".size-btn").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      gridSize = parseInt(btn.dataset.size);
      initGrid();
    });
  });

  // Tool buttons
  document.querySelectorAll(".tool-btn").forEach(btn =>
    btn.addEventListener("click", () => setTool(btn.dataset.tool))
  );

  customColorInput.addEventListener("input", () => setActiveColor(customColorInput.value));
  bgColorInput.addEventListener("input", () => { bgColor = bgColorInput.value; redraw(); });

  // Pointer events
  canvas.addEventListener("pointerdown", e => {
    e.preventDefault();
    canvas.setPointerCapture(e.pointerId);
    isPointerDown = true;
    // save undo before stroke starts
    if (activeTool === "draw" || activeTool === "erase") saveUndo();
    const cell = getCellFromEvent(e);
    lastCell = cell;
    applyTool(cell);
  });

  canvas.addEventListener("pointermove", e => {
    if (!isPointerDown) return;
    const cell = getCellFromEvent(e);
    if (!cell || (lastCell && cell.r === lastCell.r && cell.c === lastCell.c)) return;
    lastCell = cell;
    if (activeTool === "fill" || activeTool === "eyedrop") return;
    applyTool(cell);
  });

  canvas.addEventListener("pointerup", () => { isPointerDown = false; lastCell = null; });
  canvas.addEventListener("pointercancel", () => { isPointerDown = false; lastCell = null; });

  // Undo / Redo
  undoBtn.addEventListener("click", () => {
    if (!undoState) return;
    redoState = clonePixels(pixels);
    pixels = undoState;
    undoState = null;
    updateUndoRedoBtns();
    redraw();
  });

  redoBtn.addEventListener("click", () => {
    if (!redoState) return;
    undoState = clonePixels(pixels);
    pixels = redoState;
    redoState = null;
    updateUndoRedoBtns();
    redraw();
  });

  // Keyboard shortcuts
  document.addEventListener("keydown", e => {
    if ((e.ctrlKey || e.metaKey) && e.key === "z" && !e.shiftKey) { e.preventDefault(); undoBtn.click(); }
    if ((e.ctrlKey || e.metaKey) && (e.key === "y" || (e.key === "z" && e.shiftKey))) { e.preventDefault(); redoBtn.click(); }
  });

  // Resize
  window.addEventListener("resize", () => {
    const newCellSize = calcCellSize(gridSize);
    if (newCellSize !== cellSize) {
      cellSize = newCellSize;
      canvas.width = gridSize * cellSize;
      canvas.height = gridSize * cellSize;
      redraw();
    }
  });

  // Clear
  clearBtn.addEventListener("click", () => {
    saveUndo();
    pixels = Array.from({ length: gridSize }, () => Array(gridSize).fill(null));
    redraw();
  });

  // Save PNG
  saveBtn.addEventListener("click", () => {
    const emptyTransparent = transparentEmptyCheck.checked;
    const exp = document.createElement("canvas");
    exp.width = gridSize;
    exp.height = gridSize;
    const ectx = exp.getContext("2d");
    if (!emptyTransparent) {
      ectx.fillStyle = bgColor;
      ectx.fillRect(0, 0, gridSize, gridSize);
    }
    for (let r = 0; r < gridSize; r++)
      for (let c = 0; c < gridSize; c++) {
        if (pixels[r][c] === null) continue;
        ectx.fillStyle = pixels[r][c];
        ectx.fillRect(c, r, 1, 1);
      }
    const link = document.createElement("a");
    link.download = `pixelart_${gridSize}x${gridSize}.png`;
    link.href = exp.toDataURL("image/png");
    link.click();
  });

  // Trace image
  const traceLoadBtn = document.getElementById("trace-load-btn");
  const traceInput = document.getElementById("trace-input");
  const traceOpacitySlider = document.getElementById("trace-opacity");
  const traceClearBtn = document.getElementById("trace-clear-btn");

  traceLoadBtn.addEventListener("click", () => traceInput.click());
  traceInput.addEventListener("change", e => {
    const file = e.target.files[0];
    if (!file) return;
    const url = URL.createObjectURL(file);
    const img = new Image();
    img.onload = () => {
      traceImage = img;
      traceClearBtn.style.display = "";
      redraw();
      URL.revokeObjectURL(url);
    };
    img.src = url;
    traceInput.value = "";
  });
  traceOpacitySlider.addEventListener("input", () => {
    traceOpacity = parseInt(traceOpacitySlider.value) / 100;
    if (traceImage) redraw();
  });
  traceClearBtn.addEventListener("click", () => {
    traceImage = null;
    traceClearBtn.style.display = "none";
    redraw();
  });

  setActiveColor("#000000");
  initGrid();
})();
</script>

</body>
</html>
