<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pixel Art Editor</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: monospace; background: #fff; color: #000; }
a { color: inherit; text-decoration: none; }
main { padding: 16px; max-width: 900px; }
h1 { font-size: 1.2em; margin-bottom: 16px; font-weight: bold; }
#controls { display: flex; flex-direction: column; gap: 10px; margin-bottom: 16px; }
.control-group { display: flex; align-items: center; flex-wrap: wrap; gap: 6px; }
.control-group > label:first-child { min-width: 70px; font-size: 0.9em; }
button { font-family: monospace; font-size: 0.85em; background: #fff; color: #000; border: 1px solid #000; padding: 3px 8px; cursor: pointer; }
button:hover { background: #eee; }
button.active { background: #000; color: #fff; }
#size-btns, #tool-btns { display: flex; gap: 4px; }
#palette { display: flex; flex-wrap: wrap; gap: 3px; }
.palette-swatch { width: 22px; height: 22px; border: 1px solid #000; cursor: pointer; }
.palette-swatch.active { outline: 2px solid #000; outline-offset: 1px; }
#custom-color { width: 28px; height: 22px; border: 1px solid #000; padding: 0; cursor: pointer; background: none; }
#active-color-display { width: 22px; height: 22px; border: 1px solid #000; display: inline-block; vertical-align: middle; }
#canvas-wrapper { overflow: auto; border: 1px solid #000; display: inline-block; cursor: crosshair; line-height: 0; }
#canvas { display: block; image-rendering: pixelated; }
</style>
</head>
<body>
<a href="/../index.html"><img src="/assets/smileys/home.jpg" style="width:24px; height:24px; vertical-align:-7px; image-rendering:pixelated;"> Home</a>
<main>
<h1>Pixel Art Maker</h1>
<div id="controls">
  <div class="control-group">
    <label>Größe:</label>
    <div id="size-btns">
      <button class="size-btn active" data-size="16">16×16</button>
      <button class="size-btn" data-size="32">32×32</button>
      <button class="size-btn" data-size="64">64×64</button>
    </div>
  </div>
  <div class="control-group">
    <label>Werkzeug:</label>
    <div id="tool-btns">
      <button class="tool-btn active" data-tool="draw">✏ Zeichnen</button>
      <button class="tool-btn" data-tool="fill">⬛ Füllen</button>
      <button class="tool-btn" data-tool="erase">✕ Löschen</button>
      <button class="tool-btn" data-tool="eyedrop">⊙ Pipette</button>
    </div>
  </div>
  <div class="control-group">
    <label>Farbe:</label>
    <div id="palette"></div>
    <input type="color" id="custom-color" value="#000000" title="Eigene Farbe">
    <span id="active-color-display"></span>
  </div>
  <div class="control-group">
    <button id="clear-btn">Leeren</button>
    <button id="save-btn">Als PNG speichern</button>
    <label style="font-size:0.85em; margin-left:8px;">
      <input type="checkbox" id="transparent-white" checked>
      Weiß = transparent
    </label>
  </div>
</div>
<div id="canvas-wrapper">
  <canvas id="canvas"></canvas>
</div>
</main>
<script>
(function () {
  const PALETTE = [
    "#000000","#ffffff","#ff0000","#00cc00","#0000ff",
    "#ffff00","#ff8800","#ff00ff","#00ccff","#884400",
    "#ffaaaa","#aaffaa","#aaaaff","#ffddaa","#cccccc",
    "#555555","#880000","#006600","#000088","#886600",
    "#ff6688","#44aaff","#88ff44","#ff44aa","#44ffee",
    "#eeeeee","#222222","#664400","#003366","#006644",
  ];

  const canvas = document.getElementById("canvas");
  const ctx = canvas.getContext("2d");
  const paletteEl = document.getElementById("palette");
  const customColorInput = document.getElementById("custom-color");
  const activeColorDisplay = document.getElementById("active-color-display");
  const clearBtn = document.getElementById("clear-btn");
  const saveBtn = document.getElementById("save-btn");
  const transparentWhiteCheck = document.getElementById("transparent-white");

  let gridSize = 16;
  let cellSize = 24;
  let pixels = [];
  let activeColor = "#000000";
  let activeTool = "draw";
  let isMouseDown = false;
  let lastCell = null;

  function calcCellSize(size) {
    return Math.max(4, Math.floor(512 / size));
  }

  function initGrid() {
    cellSize = calcCellSize(gridSize);
    pixels = Array.from({ length: gridSize }, () => Array(gridSize).fill("#ffffff"));
    canvas.width = gridSize * cellSize;
    canvas.height = gridSize * cellSize;
    redraw();
  }

  function redraw() {
    for (let r = 0; r < gridSize; r++)
      for (let c = 0; c < gridSize; c++)
        drawCell(r, c);
    drawGrid();
  }

  function drawCell(r, c) {
    ctx.fillStyle = pixels[r][c];
    ctx.fillRect(c * cellSize, r * cellSize, cellSize, cellSize);
  }

  function drawGrid() {
    ctx.strokeStyle = "#aaaaaa";
    ctx.lineWidth = 1;
    for (let i = 0; i <= gridSize; i++) {
      ctx.beginPath();
      ctx.moveTo(i * cellSize, 0);
      ctx.lineTo(i * cellSize, gridSize * cellSize);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(0, i * cellSize);
      ctx.lineTo(gridSize * cellSize, i * cellSize);
      ctx.stroke();
    }
  }

  function getCellFromEvent(e) {
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width / rect.width;
    const scaleY = canvas.height / rect.height;
    const x = (e.clientX - rect.left) * scaleX;
    const y = (e.clientY - rect.top) * scaleY;
    const c = Math.floor(x / cellSize);
    const r = Math.floor(y / cellSize);
    if (r < 0 || r >= gridSize || c < 0 || c >= gridSize) return null;
    return { r, c };
  }

  function applyTool(cell) {
    if (!cell) return;
    const { r, c } = cell;
    if (activeTool === "draw") {
      pixels[r][c] = activeColor;
      drawCell(r, c);
      drawGrid();
    } else if (activeTool === "erase") {
      pixels[r][c] = "#ffffff";
      drawCell(r, c);
      drawGrid();
    } else if (activeTool === "eyedrop") {
      setActiveColor(pixels[r][c]);
      setTool("draw");
    } else if (activeTool === "fill") {
      floodFill(r, c, pixels[r][c], activeColor);
      redraw();
    }
  }

  function floodFill(r, c, targetColor, fillColor) {
    if (targetColor === fillColor) return;
    const stack = [[r, c]];
    const visited = Array.from({ length: gridSize }, () => Array(gridSize).fill(false));
    while (stack.length) {
      const [cr, cc] = stack.pop();
      if (cr < 0 || cr >= gridSize || cc < 0 || cc >= gridSize) continue;
      if (visited[cr][cc]) continue;
      if (pixels[cr][cc] !== targetColor) continue;
      visited[cr][cc] = true;
      pixels[cr][cc] = fillColor;
      stack.push([cr - 1, cc], [cr + 1, cc], [cr, cc - 1], [cr, cc + 1]);
    }
  }

  function setActiveColor(hex) {
    activeColor = hex;
    activeColorDisplay.style.background = hex;
    customColorInput.value = hex;
    document.querySelectorAll(".palette-swatch").forEach(s => {
      s.classList.toggle("active", s.dataset.color === hex);
    });
  }

  function setTool(tool) {
    activeTool = tool;
    document.querySelectorAll(".tool-btn").forEach(b => {
      b.classList.toggle("active", b.dataset.tool === tool);
    });
  }

  PALETTE.forEach(color => {
    const swatch = document.createElement("div");
    swatch.className = "palette-swatch";
    swatch.style.background = color;
    swatch.dataset.color = color;
    swatch.title = color;
    swatch.addEventListener("click", () => setActiveColor(color));
    paletteEl.appendChild(swatch);
  });

  document.querySelectorAll(".size-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      document.querySelectorAll(".size-btn").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      gridSize = parseInt(btn.dataset.size);
      initGrid();
    });
  });

  document.querySelectorAll(".tool-btn").forEach(btn => {
    btn.addEventListener("click", () => setTool(btn.dataset.tool));
  });

  customColorInput.addEventListener("input", () => setActiveColor(customColorInput.value));

  canvas.addEventListener("mousedown", e => {
    isMouseDown = true;
    const cell = getCellFromEvent(e);
    lastCell = cell;
    applyTool(cell);
  });

  canvas.addEventListener("mousemove", e => {
    if (!isMouseDown) return;
    const cell = getCellFromEvent(e);
    if (!cell || (lastCell && cell.r === lastCell.r && cell.c === lastCell.c)) return;
    lastCell = cell;
    if (activeTool === "fill" || activeTool === "eyedrop") return;
    applyTool(cell);
  });

  window.addEventListener("mouseup", () => { isMouseDown = false; lastCell = null; });

  function getTouchCell(e) {
    const touch = e.touches[0] || e.changedTouches[0];
    return getCellFromEvent(touch);
  }

  canvas.addEventListener("touchstart", e => {
    e.preventDefault();
    isMouseDown = true;
    const cell = getTouchCell(e);
    lastCell = cell;
    applyTool(cell);
  }, { passive: false });

  canvas.addEventListener("touchmove", e => {
    e.preventDefault();
    if (!isMouseDown) return;
    const cell = getTouchCell(e);
    if (!cell || (lastCell && cell.r === lastCell.r && cell.c === lastCell.c)) return;
    lastCell = cell;
    if (activeTool === "fill" || activeTool === "eyedrop") return;
    applyTool(cell);
  }, { passive: false });

  canvas.addEventListener("touchend", e => {
    e.preventDefault();
    isMouseDown = false;
    lastCell = null;
  }, { passive: false });

  clearBtn.addEventListener("click", () => {
    pixels = Array.from({ length: gridSize }, () => Array(gridSize).fill("#ffffff"));
    redraw();
  });

  saveBtn.addEventListener("click", () => {
    const treatWhiteAsTransparent = transparentWhiteCheck.checked;
    const exportCanvas = document.createElement("canvas");
    exportCanvas.width = gridSize;
    exportCanvas.height = gridSize;
    const ectx = exportCanvas.getContext("2d");
    if (!treatWhiteAsTransparent) {
      ectx.fillStyle = "#ffffff";
      ectx.fillRect(0, 0, gridSize, gridSize);
    }
    for (let r = 0; r < gridSize; r++)
      for (let c = 0; c < gridSize; c++) {
        const color = pixels[r][c];
        if (treatWhiteAsTransparent && color.toLowerCase() === "#ffffff") continue;
        ectx.fillStyle = color;
        ectx.fillRect(c, r, 1, 1);
      }
    const link = document.createElement("a");
    link.download = `pixelart_${gridSize}x${gridSize}.png`;
    link.href = exportCanvas.toDataURL("image/png");
    link.click();
  });

  setActiveColor("#000000");
  initGrid();
})();
</script>
</body>
</html>
