<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CPS Test - 10 Second Click Speed Test</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        a { color: inherit; text-decoration: none; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            color: #111;
        }
        .container { max-width: 700px; width: 100%; }
        header { text-align: center; margin-bottom: 20px; }
        h1 { font-size: 2em; margin-bottom: 8px; }
        .subtitle { font-size: 1em; color: #555; }
        .score-display {
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 10px;
        }
        .stat {
            text-align: center;
            padding: 12px 20px;
            border: 1px solid #ddd;
            flex: 1;
            min-width: 120px;
        }
        .stat-label { font-size: 0.85em; color: #555; margin-bottom: 4px; }
        .stat-value { font-size: 1.8em; font-weight: bold; }
        .timer-display { text-align: center; margin-bottom: 20px; }
        .timer { font-size: 3.5em; font-weight: bold; color: #111; }
        .timer-label { font-size: 1em; color: #555; margin-top: 6px; }
        .click-area {
            border: 2px solid #111;
            padding: 60px 40px;
            text-align: center;
            cursor: pointer;
            user-select: none;
            margin-bottom: 15px;
            transition: background 0.1s;
        }
        .click-area:hover { background: #f5f5f5; }
        .click-area:active { background: #e8e8e8; }
        .click-area.disabled { border-color: #ccc; cursor: not-allowed; color: #aaa; }
        .click-area.disabled:hover { background: #fff; }
        .click-text { font-size: 2em; font-weight: bold; }
        .click-count { font-size: 4em; font-weight: bold; margin-top: 15px; }
        .controls {
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 15px;
        }
        button {
            padding: 10px 24px;
            font-size: 1em;
            border: 1px solid #111;
            background: #fff;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }
        button:hover { background: #f0f0f0; }
        .result-message {
            text-align: center;
            margin-top: 15px;
            font-size: 1.1em;
            font-weight: bold;
            min-height: 28px;
        }
        .tips {
            border-top: 1px solid #ddd;
            padding-top: 20px;
            margin-top: 20px;
        }
        .tips h3 { margin-bottom: 10px; }
        .tips ul { list-style-position: inside; color: #444; }
        .tips li { margin: 6px 0; font-size: 0.95em; }
        .leaderboard { margin-top: 20px; }
        .leaderboard h3 { margin-bottom: 12px; }
        .leaderboard-entry {
            display: flex;
            justify-content: space-between;
            padding: 8px 10px;
            border-bottom: 1px solid #eee;
            font-size: 0.95em;
        }
        .leaderboard-entry:last-child { border-bottom: none; }
        @media (max-width: 600px) {
            h1 { font-size: 1.5em; }
            .click-text { font-size: 1.5em; }
            .click-count { font-size: 3em; }
            .timer { font-size: 2.5em; }
        }
    </style>
</head>
<body>
    <div style="position:fixed; top:10px; left:10px;">
        <a href="/../index.html">🏠 Home</a>
    </div>
    <div class="container">
        <header>
            <h1>CPS Test — 10 Seconds</h1>
            <p class="subtitle">How fast can you click?</p>
        </header>
        <div class="score-display">
            <div class="stat">
                <div class="stat-label">Current CPS</div>
                <div class="stat-value" id="currentCPS">0.0</div>
            </div>
            <div class="stat">
                <div class="stat-label">Best CPS</div>
                <div class="stat-value" id="bestCPS">0.0</div>
            </div>
            <div class="stat">
                <div class="stat-label">Total Tests</div>
                <div class="stat-value" id="totalTests">0</div>
            </div>
        </div>
        <div class="timer-display">
            <div class="timer" id="timer">10.0</div>
            <div class="timer-label">seconds remaining</div>
        </div>
        <div class="click-area" id="clickArea">
            <div class="click-text" id="clickText">Click to Start!</div>
            <div class="click-count" id="clickCount">0</div>
        </div>
        <div class="controls">
            <button id="resetBtn">Restart Test</button>
            <button id="clearStatsBtn">Clear History</button>
        </div>
        <div class="result-message" id="resultMessage"></div>
        <div class="tips">
            <h4>Average CPS: 5–7 | Good: 8–10 | Excellent: 11+</h3>
        </div>
        <div class="leaderboard">
            <h3>Your Recent Tests</h3>
            <div id="historyList"></div>
        </div>
    </div>
    <script>
        const clickArea = document.getElementById('clickArea');
        const clickText = document.getElementById('clickText');
        const clickCount = document.getElementById('clickCount');
        const timerDisplay = document.getElementById('timer');
        const currentCPSEl = document.getElementById('currentCPS');
        const bestCPSEl = document.getElementById('bestCPS');
        const totalTestsEl = document.getElementById('totalTests');
        const resultMessageEl = document.getElementById('resultMessage');
        const resetBtn = document.getElementById('resetBtn');
        const clearStatsBtn = document.getElementById('clearStatsBtn');
        const historyList = document.getElementById('historyList');

        let clicks = 0;
        let timeLeft = 10;
        let isRunning = false;
        let hasStarted = false;
        let timerInterval = null;
        let bestCPS = parseFloat(localStorage.getItem('bestCPS') || '0');
        let totalTests = parseInt(localStorage.getItem('totalTests') || '0');
        let history = JSON.parse(localStorage.getItem('cpsHistory') || '[]');

        bestCPSEl.textContent = bestCPS.toFixed(1);
        totalTestsEl.textContent = totalTests;
        updateHistory();

        function startTest() {
            if (isRunning) return;
            hasStarted = true;
            isRunning = true;
            clicks = 0;
            timeLeft = 10;
            clickCount.textContent = clicks;
            clickText.textContent = 'Click Fast!';
            resultMessageEl.textContent = '';

            timerInterval = setInterval(() => {
                timeLeft -= 0.1;
                if (timeLeft <= 0) {
                    timeLeft = 0;
                    endTest();
                }
                timerDisplay.textContent = timeLeft.toFixed(1);
                const currentCPS = timeLeft < 10 ? clicks / (10 - timeLeft) : 0;
                currentCPSEl.textContent = currentCPS.toFixed(1);
            }, 100);
        }

        function endTest() {
            clearInterval(timerInterval);
            isRunning = false;
            hasStarted = false;
            clickArea.classList.add('disabled');

            const finalCPS = clicks / 10;
            currentCPSEl.textContent = finalCPS.toFixed(1);
            clickText.textContent = 'Test Complete!';

            totalTests++;
            totalTestsEl.textContent = totalTests;
            localStorage.setItem('totalTests', totalTests.toString());

            history.unshift({ cps: finalCPS, clicks: clicks, date: new Date().toLocaleString() });
            if (history.length > 10) history = history.slice(0, 10);
            localStorage.setItem('cpsHistory', JSON.stringify(history));
            updateHistory();

            if (finalCPS > bestCPS) {
                bestCPS = finalCPS;
                bestCPSEl.textContent = bestCPS.toFixed(1);
                localStorage.setItem('bestCPS', bestCPS.toString());
                resultMessageEl.textContent = 'New Personal Record!';
            } else {
                resultMessageEl.textContent = getRankMessage(finalCPS);
            }

            setTimeout(() => {
                clickArea.classList.remove('disabled');
                clickText.textContent = 'Click to Start!';
            }, 2000);
        }

        function getRankMessage(cps) {
            if (cps >= 15) return 'Legendary! Insane speed!';
            if (cps >= 12) return 'Outstanding! Professional level!';
            if (cps >= 10) return 'Excellent! Very impressive!';
            if (cps >= 8) return 'Great job! Above average!';
            if (cps >= 6) return 'Good! Keep practicing!';
            if (cps >= 4) return 'Not bad! Room to improve!';
            return 'Keep trying! Practice makes perfect!';
        }

        function updateHistory() {
            if (history.length === 0) {
                historyList.innerHTML = '<div style="color:#aaa;padding:15px 0;">No tests yet</div>';
                return;
            }
            historyList.innerHTML = history.map((entry, index) => `
                <div class="leaderboard-entry">
                    <span>#${index + 1} — ${entry.cps.toFixed(1)} CPS (${entry.clicks} clicks)</span>
                    <span style="color:#777;font-size:0.9em">${entry.date}</span>
                </div>
            `).join('');
        }

        function reset() {
            if (isRunning) { clearInterval(timerInterval); isRunning = false; }
            hasStarted = false;
            clicks = 0;
            timeLeft = 10;
            clickCount.textContent = clicks;
            timerDisplay.textContent = '10.0';
            currentCPSEl.textContent = '0.0';
            clickText.textContent = 'Click to Start!';
            resultMessageEl.textContent = '';
            clickArea.classList.remove('disabled');
        }

        function clearStats() {
            if (confirm('Clear all stats and history?')) {
                bestCPS = 0; totalTests = 0; history = [];
                bestCPSEl.textContent = '0.0';
                totalTestsEl.textContent = '0';
                localStorage.removeItem('bestCPS');
                localStorage.removeItem('totalTests');
                localStorage.removeItem('cpsHistory');
                updateHistory();
                reset();
            }
        }

        clickArea.addEventListener('click', () => {
            if (!hasStarted) startTest();
            if (isRunning) { clicks++; clickCount.textContent = clicks; }
        });

        clickArea.addEventListener('touchstart', (e) => {
            e.preventDefault();
            if (!hasStarted) startTest();
            if (isRunning) { clicks++; clickCount.textContent = clicks; }
        });

        resetBtn.addEventListener('click', reset);
        clearStatsBtn.addEventListener('click', clearStats);
    </script>
</body>
</html>
